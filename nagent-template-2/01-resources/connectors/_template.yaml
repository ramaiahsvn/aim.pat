id: connector-<name>
name: "<Display Name>"
type: mcp-connector     # or: rest-api | database | file
protocol: mcp           # or: https | jdbc | local

connection:
  server: "<mcp-server-image-or-command>"
  auth:
    type: personal_access_token   # or: oauth2 | api_key | none
    env_var: <ENV_VAR_NAME>

status: pending_auth    # or: connected | disabled

capabilities:
  - <capability_1>
  - <capability_2>

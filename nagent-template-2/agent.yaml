agent:
  name: "<Agent Name>"
  code: "<code>"
  group: "<group>"
  template: "nagent-template-2"
  version: "1.0.0"
  description: "<What this agent does>"
  created_by: "<Your Name>"
  created_at: "<date>"

components:

  01_dand:
    path: "./01-dand"
    role: "Resources — project context and task inputs"
    contains:
      context.yaml: "Project description, tasks, git repo URLs, and general inputs"

  04_axon:
    path: "./04-axon"
    role: "Workflows — step-by-step task definitions"
    contains:
      "*.yaml / *.md": "One file per workflow; Claude reads these to know how to execute tasks"

  07_term:
    path: "./07-term"
    role: "Outputs — finished work delivered here"
    contains:
      deliverables: "Generated files, reports, exports"

  08_memo:
    path: "./08-memo"
    role: "Memory — what the agent remembers across tasks"
    contains:
      session:   "Scratch notes for the current task"
      long-term: "Persistent facts, learned preferences, history"

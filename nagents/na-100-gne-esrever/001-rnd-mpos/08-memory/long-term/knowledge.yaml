  - id: mem-004
    type: technical_knowledge
    content: >
      Build gotcha: bpr1003.itp.mpos.2.ebe variants are built on **Windows**. On macOS,
      mPos.P2.11/app/build.gradle hardcodes a Windows keystore path (C:/CQI/.../Q2POS.jks) that
      Gradle evaluates at configuration time, breaking ALL tasks. F2/Q2 have no hardcoded keystore
      (P2 uses relative ../app/sunmi.jks) so they are cleaner local-build targets. JDK17 at
      /opt/homebrew/opt/openjdk@17; Android SDK at ~/Library/Android/sdk. Cannot visually verify
      UI parity headless (no device/emulator) — parity is a rendered-screen judgment for the team.
    created_at: "2026-06-08"
    confidence: 0.95
    tags: [build, gradle, windows-keystore, macos, verification-limit]

  - id: mem-005
    type: technical_knowledge
    content: >
      HARD build blocker (2026-06-08): bpr1003.itp.mpos.2.ebe CANNOT build on this Mac even for F2.
      :mPos.Controller:debugCompileClasspath fails — "Could not find :mPosCore_1.10.117:" and
      ":sonic-sdk-release-1.5.0:" (vendor AARs not present/resolvable locally). So there is NO local
      compile gate for ANY change; verification must happen on the Windows build host (or after those
      vendor AARs are provided). Also: the "missing icons" (reviewer item 4) is NOT unresolved
      resources — an autonomous scan found 0 missing @drawable refs; all resolve via the app module or
      the shared mPos.Controller (which holds the ebe_* drawables: ebe_bg_input_field, round_green_btn,
      ebe_keyboard_ok_button, etc.). The icon gap is VISUAL/wiring (old icons shown or EBE icons not
      referenced), requiring rendered EBE screens + per-screen edits, not a file import. Lesson: search
      mPos.Controller (shared) too, not just app module + EBE repo, when checking resource presence.
    created_at: "2026-06-08"
    confidence: 1.0
    tags: [build-blocker, vendor-aar, mpos-controller, icons, no-local-build, verification]


# Task — Offline Data Authentication (ODA / RSA / EMV certificate PKI)
#
# Opened 2026-07-13. GAP found while prepping perso for a live MC card: the MC profile
# (PFL_..._MCC.xml) carries the full ODA tag set (8F/90/92/9F32/9F46/9F47/9F48/9F49/9F4A) =>
# the card is DDA/CDA-capable and REQUIRES the RSA certificate chain. The engine implements
# NONE of it (symmetric only), and the grc-kms key request (handoff-na005-008) did NOT include
# the issuer RSA key or the scheme-CA certificate. This task records the whole ODA workstream.

task:
  id: "task-004"
  subject: "EMV Offline Data Authentication — RSA key path + issuer/ICC certificates (SDA/DDA/CDA)"
  status: in_progress          # 2026-07-15: MASTERCARD ODA DONE LIVE — full M/Chip card personalized end-to-end,
                               # all 41 DGIs incl. ICC+issuer+CA cert chain -> 9000, card functional (GPO/READ/VERIFY PIN);
                               # secret-loading gap was DGI ORDERING, not crypto (see knowledge mem-016). Remaining: real
                               # 9F46 with the REAL issuer key is OPTIONAL (UAT uses a self-signed test chain); Visa ODA
                               # (task-004.5/.6) + terminal-side verification still open.
  priority: high
  created_at: "2026-07-13"
  source: "gap found during live MC card perso attempt (task-003 context)"
  owner: "rnd-cperso (na-100/003) — planner/design; implementation delegated to na-005 + na-100/001"
  tags: [oda, rsa, sda, dda, cda, capk, issuer-cert, icc-cert, emv, pki, perso-engine, gap]

# ---- Why it matters (one line) ----
why: >
  Symmetric keys let the card transact ONLINE; the RSA certificate layer is what lets an OFFLINE
  terminal verify the card is genuine (anti-clone). The MC profile mandates it (tags 8F/90/9F46...).

# ---- The 3-tier PKI (reference) ----
pki:
  tier1_scheme_ca: "Mastercard CA holds root private key; its CAPK is pre-loaded in every terminal (tag 8F selects it)."
  tier2_issuer:    "We generate Issuer RSA keypair; send Issuer PUBLIC key to MC CA -> CA returns Issuer PK Cert (tag 90). One-time per BIN."
  tier3_icc:       "Per card during perso: generate ICC RSA keypair; sign ICC public key with ISSUER PRIVATE key -> ICC Cert (tag 9F46). ICC private key stays on chip."

# ---- TODO LIST ----
subtasks:
  - id: "task-004.1"
    subject: "Obtain the Issuer RSA key path — route to the PERSO BUREAU (not grc-kms)"
    owner: "rnd-cperso (coordinate) -> perso bureau (MENTA/Thales); grc-kms only for the symmetric keys"
    detail: >
      CLARIFIED 2026-07-15 (see 07-axon-terminals/deliverables/2026-07-15-issuer-rsa-key-process.md).
      The issuer RSA key is ASYMMETRIC issuer PKI — NOT a grc-kms symmetric bureau key (that's why it's not
      alongside the ISD/IMK). The perso bureau (MENTA/Thales) ALREADY HOLDS the issuer private key in their HSM
      — the decoded trace wrote real 9F46 certs signed by it, and we already captured its Issuer PK Certificate
      as config DGI 0404 (tag 90). The private key is never exported in clear.
      DECISION FORK (business/user):
        Option A — perso stays at the bureau: they sign 9F46; we never hold the private key. Simplest.
        Option B — perso in OUR HSM: bureau transfers the issuer key HSM->HSM encrypted (KEK/ZMK or key
          ceremony). Arrange with the BUREAU, not the bank.
      ASK THE BUREAU (MENTA/Thales): (1) bureau-side signing vs provision into our HSM? (2) issuer key metadata
      (non-secret): CA PK index (8F, saw EF), issuer key index, modulus length, exponent (9F32=03), KCV/label,
      expiry, Issuer PK Cert (tag 90 = our DGI 0404); (3) for UAT: which TEST issuer key + TEST CAPK, and will
      they load the test issuer key into our HSM.
      The ISSUER (bank) is only in the one-time MC CA registration (public key -> Mastercard), almost certainly
      already done for this BIN; we do NOT get the key value from them.
      ALSO ASK THE BUREAU (added 2026-07-15 after the first live perso): the SECRET-LOADING KEY-BLOCK FORMAT.
      The live run accepted 31/41 DGIs incl. the RSA certs; the 9 encrypted key DGIs (8000/8001/8010/8203-8205/
      A006/A016/9000) all return 6A80. We decoded the DGI format (16-byte 3DES-ECB DEK-enc key, no KCV — matches
      our engine) and RULED OUT the DEK choice live (session + static both 6A80). The applet loads keys via the
      Thales KMS stdCPSEmvGeGKOSConfForSecretLoading (black box). Need: the M/Chip Advance CPS confidential-DGI /
      GeneralOS secret-loading spec (exact DEK derivation for secret loading + any per-block header + whether an
      'initialize secret loading' precedes the encrypted DGIs); the PIN/KEY encryption KEKs (G0E01.TEST.PINENC/
      KEYENC.KEK.01) if we load keys our side; and the SFI-14 (0E01) record definition for profile
      Mastercard_DI_GFCX9_MChipAdvance. Full decode: 07-axon-terminals/deliverables/2026-07-15-issuer-rsa-key-
      process.md + mc-advance-dgi-map.md.
      UAT SHORTCUT (buildable NOW, no external dep): use a self-generated test issuer key (perso::oda already
      does this + signs 9F46 e2e) + a Mastercard TEST CAPK, and REGENERATE DGI 0404 (re-certify the test issuer
      public key under the test CA) so the card chains self-consistently. Only a card that must chain to the
      REAL 0404 needs the real issuer key from the bureau.
      Update handoff-na005-008-perso-engine-bureau-keys.md: MOVE the issuer-RSA ask from grc-kms to the bureau.
    status: mostly_resolved   # 2026-07-15 — the SECRET-LOADING half of this ask is CLOSED (knowledge mem-016/017):
                              # the 9 encrypted-key-DGI 6A80s were DGI ORDERING (keys-region-first + AD14-last), not an
                              # unknown key-block format. The delivered PURE + M/Chip Advance manuals CONFIRMED the engine's
                              # key crypto (3DES-ECB under SKUDEK = SCP02 session DEK). MasterCard is personalized end-to-end
                              # with a SELF-SIGNED TEST issuer key + regenerated DGI 0404 — no bureau dependency for UAT.
                              # STILL OPEN (narrowed): (1) the REAL issuer RSA key — needed ONLY for a card that must chain to
                              # the REAL 0404 (production BIN), not UAT; decision fork A (bureau signs 9F46) vs B (HSM->HSM
                              # transfer) unchanged; (2) VISA UAT IMKs — NOT in keys/uat_keystore.txt (only MC IMKs); this is
                              # DELIVERED 2026-07-20: bureau added Visa IMK-AC/SMI/SMC to Resources/UAT_Keys.txt, encrypted
                              # under the same ZMK (KCV A85DE2) as MC. Bureau ask CLOSED. Remaining is an INTERNAL load step
                              # (bruid-dprep): ZMK-decrypt + validate KCVs + add to the engine keystore under Visa labels, then
                              # bruid-cperso derives Visa UDKs (see task-004 Visa + knowledge mem-018).
    priority: high


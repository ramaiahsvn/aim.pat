# ---- Guardrails ----
guardrails:
  - "Private keys (issuer RSA, ICC RSA) NEVER leave the HSM/card and are NEVER stored in any file — labels only."
  - "Public keys / certificates (tags 8F/90/92/9F32/9F46/9F47/9F48) are non-secret and may be recorded."
  - "Sandbox first: Mastercard PUBLISHED TEST CAPKs — no real CA registration until production."


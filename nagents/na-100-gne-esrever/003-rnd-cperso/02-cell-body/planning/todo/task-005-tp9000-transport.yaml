    status: pending
    priority: medium
    depends_on: ["task-005.3", "task-005.4"]

# ---- Vendor spec (authoritative API reference) ----
vendor_spec:
  doc: "bpr.cpp/docs/Specification for Nuvia TPK DLL_4 1 2 5(E)_20240708.doc"
  title: "POINTMAN — Card Printer Standard User Library Specifications (TP9000.DLL) API, rev 4.1.2.5 (2024-07-08)"
  device_class: >
    It is a CARD PRINTER / ENCODER (print + magstripe + IC + optional RF on one motorized path) — i.e. an
    INSTANT-ISSUANCE device. This is the ground for the iperso scoping below.
  key_api_facts:
    - "IC_PowerOn(cno, *rxSize, rxData) -> ATR in rxData. cno: 0=Main, 1=Mobile SIM, 2/3=SAM sockets. (Implements the ATR stub.)"
    - "IC_PowerOnEx(cno, ..., nMode) — nMode 1=ISO, 2=EMV. USE nMode=2 (EMV) for payment perso; the current wrapper calls plain IC_PowerOn (no mode)."
    - "IC_Input(cno, txSize, tx, *rxSize, rx) = one APDU exchange (what the wrapper uses). IC_MultiAPDU batches N APDUs (count||LV list) — optional optimization; per-APDU is better for STORE DATA error localization."
    - "IC_Input2 / IC_PowerOnEx2 add nDev (1=Internal, 2=External) for CMM/external IFM."
    - "Card feed/eject: Card_Insert/InsertEx, Card_Eject/EjectEx (Full-eject param), IC_Eject(0)=front/hopper, CheckStackerCard. GetTPKStatus = sensor/path/stacker status (anti-skimming field)."
    - "CheckFeeder is DEPRECATED for TPK ('Not using for TPK') — the wrapper's CheckFeeder call should move to GetTPKStatus."
    - "IFM under the hood may itself be a PCSC reader (e.g. GemCore POS Pro USB) but is exposed ONLY via the TPK IC_* API, not winscard — so our transport still goes through TP9000.dll."
  contactless_finding: >
    The RF module in this DLL rev is MIFARE BLOCK-OPS ONLY: RF_CardInsert / RF_PowerOnEx(+ATS) /
    RF_Read / RF_Write / RF_Increment / RF_Decrement / RF_Authenticate. There is NO general ISO14443-4
    (T=CL) APDU-exchange function (no RF_Input/RF_APDU). => Contactless EMV perso is NOT supported by
    TP9000.dll as-is; CONTACT-ONLY is the correct scope. Escalate to Pointman if dual-interface perso is
    ever required (need a newer DLL with a T=CL APDU pipe, or route CL through the IC socket).

# ---- Open questions for the user / vendor ----
open_questions:
  - "RESOLVED 2026-07-21 (user): this IS the iperso (instant/kiosk) transport, NOT cperso. Primary owner = bruid-iperso (na-005/010). Confirmed by the vendor spec (a card printer/encoder = instant-issuance device) and the existing Pointman kiosk integration (bruid-iperso input 2026-07-13)."
  - "RESOLVED 2026-07-21 (vendor spec): contactless is Mifare-block-only in this DLL rev — CONTACT-ONLY scope. Revisit with Pointman only if dual-interface EMV perso is needed."
  - "OPEN: TP9000.dll bitness + version on the perso host (x86 vs x64) — must match the host process; our Windows persoengine build target. (Spec is rev 4.1.2.5; confirm the deployed DLL matches.)"
  - "OPEN: T=0 vs T=1 and max APDU/RX buffer through IC_Input — affects 61xx/6Cxx handling + any extended-length use. Consider IC_PowerOnEx nMode=2 (EMV) for correct protocol negotiation."

# ---- Guardrails ----
guardrails:
  - "No engine-core changes — Tp9000Channel sits behind ICardChannel; tlv/profile/sequencer/oda untouched."
  - "Windows-only: gate all TP9000 sources on WIN32 + PERSOENGINE_BUILD_TP9000; keep the default OFF so pat-m4p builds/tests stay hardware-free."
  - "PCI: same as PC/SC — synthetic/test PANs only, never log TRACK/PIN/CVV, DEK-wrapped key DGIs only; the transport does not change the data path."
  - "Feeder actions (Card_Insert/Card_Eject) move physical cards — a reject/divert path must exist so a failed card is never ejected as good."


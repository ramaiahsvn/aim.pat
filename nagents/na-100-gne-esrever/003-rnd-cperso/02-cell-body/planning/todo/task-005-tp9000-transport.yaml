# Task — Pointman TP9000 card-feeder transport for the perso engine
#
# Opened 2026-07-21. The perso engine (bpr.cpp/src/BprCardEmv/persoengine) currently
# transmits APDUs over ONE transport only: PC/SC (BprPcScChannel, behind
# PERSOENGINE_BUILD_PCSC). All live MC + Visa perso ran through it (rnd-cperso mem-016/mem-018;
# bruid-cperso mem-024/mem-026). We now need a SECOND transport: the Pointman TP9000 motorized
# card feeder/dispenser, whose vendor DLL owns the reader hardware directly and does NOT go
# through winscard/pcsclite. A partial legacy wrapper already exists; this task designs the
# clean integration behind the engine's ICardChannel seam and hands implementation to BRUID.

task:
  id: "task-005"
  subject: "Add a Pointman TP9000 ICardChannel transport (feeder-fed instant/counter issuance)"
  status: delegated           # 2026-07-21 — HANDED OFF to bruid-iperso (na-005/010): task-002-tp9000-transport.yaml
                              # + input 01-dendrite/inputs/2026-07-21-tp9000-transport-handoff.md. rnd-cperso now
                              # holds design/review only. IMPL UPDATE 2026-07-21: bruid-iperso implemented the core —
                              # but did NOT finish the legacy Tp9000Card (in use by BprCardQi/BprCardEmv). Instead a
                              # SELF-CONTAINED tp9k_v2 (Tp9000CardV2) + Tp9000Channel were added; CMake option
                              # PERSOENGINE_BUILD_TP9000 (WIN32); macOS build green (94/94). So the design note below
                              # ("wraps Tp9000Card") was superseded: the channel wraps Tp9000CardV2. Bench on Windows pending.
  priority: medium
  created_at: "2026-07-21"
  source: "user request 2026-07-21 — integrate the Pointman (Tp9k) interface alongside PC/SC"
  owner: "rnd-cperso (na-100/003) — design/plan; implementation delegated to na-005 BRUID (see per-subtask)"
  tags: [tp9000, pointman, transport, icardchannel, feeder, instant-perso, iperso, windows-only, perso-engine]

# ---- Why it matters (one line) ----
why: >
  Bureau perso uses fixed PC/SC readers; instant/counter issuance uses a motorized card FEEDER that
  pulls blanks from a hopper, personalizes, then ejects. The TP9000 is that feeder — it needs its own
  APDU transport because the vendor DLL drives the chip contacts directly, not through PC/SC.

# ---- What already exists (ground truth, verified 2026-07-21) ----
existing_code:
  legacy_wrapper:
    path: "bpr.cpp/src/BprPcSc/tp9k/tp9k.{h,cpp}"
    class: "Tp9000Card"
    nature: >
      Windows-only wrapper around Pointman's proprietary TP9000.dll (LoadLibrary + GetProcAddress).
      NOT a PC/SC reader — the vendor DLL owns the hardware. It is a card FEEDER/DISPENSER.
    dll_exports_used:
      CheckFeeder:   "int(int* pStatus) — hopper/feeder status"
      Card_Insert:   "int() — pull a blank from the hopper into the contact station"
      IC_ContactOn:  "int() — drop contacts onto the chip"
      IC_PowerOn:    "int(cno, uint* pRXSize, LPCBYTE pRXData) — cold reset / return ATR"
      IC_Input:      "int(cno, uint TXSize, LPCBYTE TX, uint* pRXSize, LPCBYTE RX) — TRANSMIT one APDU"
      Card_Eject:    "int(nOption) — eject the finished card"
    public_methods:
      PatTp9000_ATR:      "STUB — returns literal 'Pointman ATR need to implement' (no real ATR decode)"
      PatTp9000_Open:     "PARTIAL — LoadLibrary + resolve exports OK; IC_ContactOn/IC_PowerOn calls COMMENTED OUT"
      PatTp9000_Transmit: "FUNCTIONAL — cno=0, wraps IC_Input (send APDU -> RX buffer)"
      PatTp9000_Close:    "STUB — Card_Eject COMMENTED OUT"
    limitation: >
      Windows-only (afx.h/windows.h, __stdcall, LoadLibrary; TP9000.dll is a Win32 DLL). Cannot run on
      pat-m4p/pcsclite where the MC/Visa dev runs happened — only on the Windows perso host.
  legacy_dispatch:
    where: "bpr.cpp/src/BprCardQi/BprCardQi.cpp:267 PatCard_Transmit()"
    pattern: >
      Slot-based transport switch already used by the OLD BprCardQi/BprCardEmv modules:
        userCardSlot == PAT_SLOT_HOST(-2)  -> PatHost_Transmit_Common (KMS host callback)
        userCardSlot == PAT_SLOT_TP9000(-1) -> PatTp9000_Transmit_Common (the feeder)
        else (>=0)                          -> PatPcSc_Transmit_Common (numbered PC/SC reader)
      Constants: BprCardQi.h:100  #define PAT_SLOT_TP9000 -1 / PAT_SLOT_HOST -2.
    runtime_config: >
      Matches MCES2 BprMces2Config.xml -> Perso/UserCardSlot (-1 = TP9000, >=0 = PC/SC slot).
      So the -1==TP9000 convention is already established across the stack.
  perso_engine_gap:
    finding: >
      The NEW persoengine has ZERO TP9000 references. It implements ONE ICardChannel — BprPcScChannel
      (card_bprpcsc.{hpp,cpp}, guarded by PERSOENGINE_BUILD_PCSC). The live apps hard-construct it:
      apps/perso-live-visa/main.cpp:257  `drv::BprPcScChannel ch;` (same in perso-live). No transport
      selection point exists yet.

# ---- The seam we build against (no engine-core changes needed) ----
seam:
  interface: "perso::driver::ICardChannel (card.hpp:29) — virtual ApduResponse transmit(const Bytes& capdu)"
  contract: >
    transmit() must return the FINAL data+SW, resolving 61xx (GET RESPONSE) and 6Cxx (re-issue with exact
    Le) internally — exactly as BprPcScChannel::transmit() does. run_store_data()/the sequencer only ever
    see ICardChannel, so a second implementation is a drop-in; NO change to tlv/profile/sequencer/oda.

# ---- DESIGN: add a Tp9000Channel implementation ----
design:
  new_class: "perso::driver::Tp9000Channel : public ICardChannel"
  files:
    - "persoengine/include/persoengine/card_tp9000.hpp"
    - "persoengine/src/card_tp9000.cpp"
  wraps: "bpr.cpp Tp9000Card (src/BprPcSc/tp9k) — reuse, don't reinvent the DLL binding"
  lifecycle:
    connect:  "PatTp9000_Open() -> GetTPKStatus (NOT CheckFeeder — deprecated) -> Card_Insert if no card present -> IC_ContactOn -> IC_PowerOnEx(cno=0, nMode=2 EMV) capturing ATR"
    transmit: "IC_Input(cno=0, capdu) -> raw response; THEN apply the SAME 61xx/6Cxx resolution loop as BprPcScChannel (the vendor DLL does raw I/O, so chaining is OUR responsibility)"
    atr:      "expose atr() from the IC_PowerOnEx RX buffer (replaces the 'need to implement' stub)"
    close:    "Card_EjectEx on success; a reject/divert eject for a failed card; leave-in-station option for QA re-read before eject"
  build_guard:
    cmake_option: "PERSOENGINE_BUILD_TP9000 (default OFF) — mirrors PERSOENGINE_BUILD_PCSC (CMakeLists.txt:41)"
    platform: "WINDOWS ONLY. Gate the sources on WIN32; on non-Windows the option is a no-op (TP9000.dll unavailable). Pairs with the existing winscard-vs-pcsclite backend split (CMakeLists.txt:55-64)."
  app_wiring:
    change: >
      Replace the hard-coded `drv::BprPcScChannel ch;` in perso-live / perso-live-visa with a
      transport factory selected by a flag: `--transport pcsc|tp9000` (default pcsc), or reuse the
      slot convention (-1 => tp9000). Return std::unique_ptr<drv::ICardChannel>. Everything downstream
      (open_ch, STORE DATA stream, SET STATUS, self-verify) is unchanged.
    example: >
      std::unique_ptr<drv::ICardChannel> ch =
        (transport == "tp9000") ? drv::make_tp9000_channel()   // #ifdef PERSOENGINE_BUILD_TP9000
                                : drv::make_pcsc_channel(reader);


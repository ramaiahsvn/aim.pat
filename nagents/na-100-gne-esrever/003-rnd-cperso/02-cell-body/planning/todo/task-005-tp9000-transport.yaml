      Replace the hard-coded BprPcScChannel construction (perso-live-visa/main.cpp:257) with a factory:
      --transport pcsc|tp9000 (default pcsc) returning unique_ptr<ICardChannel>. Preserve the -1==TP9000
      slot convention for parity with MCES2 BprMces2Config.xml. Everything downstream is transport-agnostic.
    status: pending
    priority: medium
    depends_on: "task-005.2"

  - id: "task-005.4"
    subject: "Feeder-lifecycle sequencing (batch semantics for instant issuance)"
    owner: "bruid-iperso (na-005/010)"
    detail: >
      Instant issuance is per-card feed->perso->verify->eject, not a fixed reader. Define: when to
      Card_Insert (per card), where the perso stream runs, the QA read-back BEFORE eject (self-verify:
      GPO/READ RECORD/VERIFY PIN as in mem-026), and eject-good vs divert-reject. Map to the domain model
      (iperso = central DataPrep -> APDU script pushed to kiosk; the feeder is the kiosk's card handler).
    status: pending
    priority: medium
    depends_on: "task-005.2"

  - id: "task-005.5"
    subject: "Bench-verify on the Windows perso host with a real TP9000"
    owner: "bruid-iperso (na-005/010) + bruid-cperso (na-005/009)"
    detail: >
      Cannot be tested on pat-m4p (Windows-only DLL). On the Windows host with a TP9000 + blanks: confirm
      feeder status, insert, ATR, an end-to-end perso (reuse the proven Visa/MC stream), self-verify, eject.

    status: blocked
    priority: high
    blocked_by: ["task-002.1"]
    estimated_steps: 4

  - id: "task-002.3"
    subject: "Implement C++ EMV engine module-by-module"
    detail: "Build TLV/DGI -> APDU -> HSM client -> embossing parser -> sequencer -> GP SCP, with tests."
    status: blocked
    priority: high
    blocked_by: ["task-002.2"]
    estimated_steps: 8

  - id: "task-002.4"

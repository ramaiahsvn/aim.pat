# Task — cperso.thales (Thales Operas HSM perso integration)

task:
  id: "task-002"
  subject: "Work on trp1002.cperso.thales — Thales Operas HSM perso integration"
  description: >
    Maintain/extend the Thales Operas HSM integration with the MCES2 (Mühlbauer)
    perso machine, and build a from-scratch C++ EMV personalization engine.
    Current system is a Calypso/ticketing (TRANSLINK) perso line: the C# bridge
    ISPI4MLB2.dll registers 22 SCPM callbacks into the proprietary SPI4MLB2.dll
    (P/Invoke: DLL_RegisterCB/Initialize/Execute/Terminate/GetAuditFields);
    Interpreter.dll runs .per bytecode that calls Operas macros (GenericCrypto.ini)
    -> KMS (kmsapipc.dll @ 172.17.0.11:3500) -> HSM. The planned C++ EMV engine
    (project_emv_perso_engine.md) aims to replace proprietary .per bytecode with
    an open EMV perso implementation.
  status: in_progress      # pending | in_progress | completed | blocked | on_hold
  status_note: "Activated 2026-05-30 (user moved focus here from task-001)."
  priority: high           # critical | high | medium | low
  created_at: "2026-05-30"
  assigned_to: null
  blocked_by: []
  blocks: []
  estimated_steps: 20
  tags: [perso, thales, operas, hsm, mces2, emv, calypso, ispi4mlb2, cpp]

# ---- Scope / working path (allowlisted in 03-nucleus/CLAUDE.md) ---- #
scope:
  path: "/Users/bnprs/BPR/GitRepos2/TRP1002_cPerso/trp1002.cperso.thales"
  git:
    branch: "main"
    remote: "git@github.com:ITPCQI/trp1002.cperso.thales.git"   # GitHub (ITPCQI) — NOT the mces2 GitLab
  components:
    custom_code:
      - "ISPI4MLB2/ISPI4MLB2/ChipCoding.cs              — base: 22 SCPM callbacks + P/Invoke"
      - "ISPI4MLB2/ISPI4MLB2/ChipCodingStartProcess.cs   — per-card exec (DLL_Execute)"
      - "ISPI4MLB2/ISPI4MLB2/ChipCodingPrepareProcess.cs — job init (DLL_Initialize)"
      - "Operas/GenericCrypto.ini                        — HSM crypto macro definitions"
    thales_proprietary_readonly:
      - "SPI4MLB2.dll (1.0.0.1), Interpreter.dll (7.22.3.9), XOtm.exe, OP_*.dll"
      - "SLBCryptoAPI.dll, UPSIaccess.dll, kmsapipc.dll"
    analysis:
      - "HSM_INTEGRATION_ANALYSIS.md       — full architecture + key hierarchy + callback map"
      - "ISPI4MLB2/Dlls/REVERSE_ENGINEERING.md"
      - "ISPI4MLB2/Dlls/SPI4MLB2_decompiled.c, Interpreter_decompiled.c"
      - "project_emv_perso_engine.md       — planned C++ EMV engine (6 open questions)"

# ---- Objective ---- #
objective: >
  Two tracks: (A) keep the existing ISPI4MLB2 <-> Operas/KMS ticketing pipeline
  documented and working (complete partial callbacks where needed); (B) design
  and build the planned standalone C++ EMV personalization engine once the 6
  open questions in project_emv_perso_engine.md are answered.

# ---- Subtasks ---- #
subtasks:
  - id: "task-002.1"
    subject: "Resolve the 6 open questions for the C++ EMV engine"

      - "ISPI4MLB2/Dlls/SPI4MLB2_decompiled.c, Interpreter_decompiled.c"
      - "project_emv_perso_engine.md       — planned C++ EMV engine (6 open questions)"

# ---- Objective ---- #
objective: >
  Two tracks: (A) keep the existing ISPI4MLB2 <-> Operas/KMS ticketing pipeline
  documented and working (complete partial callbacks where needed); (B) design
  and build the planned standalone C++ EMV personalization engine once the 6
  open questions in project_emv_perso_engine.md are answered.

# ---- Subtasks ---- #
subtasks:
  - id: "task-002.1"
    subject: "Resolve the 6 open questions for the C++ EMV engine"
    detail: >
      project_emv_perso_engine.md is blocked on: (1) target platform Win/Linux,
      (2) HSM type (same Thales KMS vs payShield/Luna/SoftHSM), (3) card type
      (EMV payment vs Calypso vs both), (4) integration target (plug into MCES2
      pipeline / standalone PC/SC+HSM / emit .per bytecode), (5) card profile
      spec (EMV tag list + sources), (6) embossing file format.
    status: resolved     # 2026-07-01: Q5+Q6 delivered via Resources/; Q1 platform = free choice (recommend CMake)
    priority: high
    blocked_by: []
    needs_from_user: "None gating — Q1 platform is a design decision (recommend cross-platform CMake)"
    estimated_steps: 1

  - id: "task-002.2"
    subject: "Architect the C++ EMV perso engine (module design)"
    detail: >
      Design the 6 planned modules: TLV/DGI encoder (BER-TLV), APDU engine
      (ISO 7816), HSM client (derive/MAC/encrypt), embossing parser, perso
      sequencer, GlobalPlatform SCP. Define interfaces + build system.
      Reference inputs now available (Resources/): Visa VPA profile carries the DGI map;
      MC ADDONS profile gives EMV tag set; Gemalto/TechTrex traces give the SCP02 perso
      APDU sequence for the sequencer + GP SCP modules.
    status: completed   # 2026-07-01: architecture delivered
    priority: high
    blocked_by: []
    estimated_steps: 4
    deliverable: "08-memory/long-term/thales/emv-engine-architecture.md — layered design, 8 modules
      (tlv/profile/embossing/hsm/card/gp/sequencer/audit), 2 HW seams (IHsmClient PKCS#11, ICardChannel
      PC/SC), SCP02 sequencer derived from Gemalto trace, CMake layout, 6-phase roadmap feeding 002.3."

  - id: "task-002.3"
    subject: "Implement C++ EMV engine module-by-module"
    detail: >
      Build per the 6-phase roadmap in emv-engine-architecture.md:
      P1 tlv+profile -> P2 embossing -> P3 hsm(SoftHSM) -> P4 card+gp(SCP02) ->
      P5 sequencer+audit -> P6 Calypso key path + real-HSM adapter. Trace-replay
      (Gemalto/TechTrex) is the acceptance oracle for the APDU sequence.
    status: pending     # 2026-07-01: UNBLOCKED (002.2 done) — ready to start at Phase P1
    priority: high
    blocked_by: []
    estimated_steps: 8

  - id: "task-002.4"
    subject: "Document/maintain the existing ISPI4MLB2 <-> Operas pipeline"
    detail: >
      Keep HSM_INTEGRATION_ANALYSIS.md current; consolidate reverse-engineering
      notes. Actionable now (analysis only, no proprietary DLL changes).
    status: pending
    priority: medium
    blocked_by: []
    estimated_steps: 3

  - id: "task-002.5"
    subject: "Complete partial / unimplemented SCPM callbacks (if in scope)"
    detail: >
      Callbacks 11/12 CLPowerOn/Off (partial, MCES2 limitation) and 13-15 MIFARE
      SetKeys/Authenticate/GetLastError (not implemented). Only if MIFARE/CL
      power control is required by a target card.
    status: blocked
    priority: low
    blocked_by: []
    needs_from_user: "Confirm whether MIFARE / contactless RF power control is required"
    estimated_steps: 3


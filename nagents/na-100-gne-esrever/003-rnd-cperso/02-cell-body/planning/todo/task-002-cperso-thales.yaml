# Task — cperso.thales (Thales Operas HSM perso integration)

task:
  id: "task-002"
  subject: "Work on trp1002.cperso.thales — Thales Operas HSM perso integration"
  description: >
    Develop / maintain the Thales Operas HSM integration with the MCES2
    (Mühlbauer) perso machine. The ISPI4MLB2 bridge (C# .NET 4.6) connects the
    MCES2 host to the Operas crypto/perso stack via P/Invoke (DLL_RegisterCB,
    DLL_Initialize, DLL_Execute). Covers OP_Perso (card APDUs), OP_GenericCrypto
    (KMS/HSM crypto), OP_VISB (TLV build), key management, and the planned C++
    EMV perso engine. Specific deliverables to be supplied by the user per work item.

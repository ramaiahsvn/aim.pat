  git:
    branch: "main"
    remote: "git@github.com:ITPCQI/trp1002.cperso.thales.git"   # GitHub (ITPCQI) — NOT the mces2 GitLab
  components:
    custom_code:
      - "ISPI4MLB2/ISPI4MLB2/ChipCoding.cs              — base: 22 SCPM callbacks + P/Invoke"
      - "ISPI4MLB2/ISPI4MLB2/ChipCodingStartProcess.cs   — per-card exec (DLL_Execute)"
      - "ISPI4MLB2/ISPI4MLB2/ChipCodingPrepareProcess.cs — job init (DLL_Initialize)"
      - "Operas/GenericCrypto.ini                        — HSM crypto macro definitions"
    thales_proprietary_readonly:
      - "SPI4MLB2.dll (1.0.0.1), Interpreter.dll (7.22.3.9), XOtm.exe, OP_*.dll"
      - "SLBCryptoAPI.dll, UPSIaccess.dll, kmsapipc.dll"
    analysis:
      - "HSM_INTEGRATION_ANALYSIS.md       — full architecture + key hierarchy + callback map"

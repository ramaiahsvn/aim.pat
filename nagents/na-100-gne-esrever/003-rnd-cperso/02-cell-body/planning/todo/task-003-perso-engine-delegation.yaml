    DLL exports, glog, BprLicense, PC/SC). persoengine has NO filename collisions with it. The
    BRUID agents integrate persoengine into the bpr.cpp CMake/module conventions (bpr_*_src.cmake,
    BprLicense, BprPcSc) as production work — it is currently a standalone CMake sub-tree.
  prototype_state: "P1 (tlv+profile) + P2 (embossing) built & verified; committed to trp1002.cperso.thales@main (06ed4e4, a34c06f) before the move."


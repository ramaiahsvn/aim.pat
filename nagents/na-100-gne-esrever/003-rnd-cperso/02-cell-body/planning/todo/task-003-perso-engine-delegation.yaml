# ---- Central vs Instant perso (user definitions, 2026-07-04) ---- #
domain_model:
  central_perso: >
    "cPerso" — personalization happens FULLY inside the perso bureau (secure facility,
    HSM present on-site). High-volume offline batch. Owner: bruid-cperso (009).
  instant_perso: >
    "iPerso" — DataPrep happens CENTRALLY (where the HSM is available); the final APDU
    perso scripts are then sent REMOTELY to a kiosk machine that is open to the public.
    Any customer can walk up to the kiosk and get their card issued instantly. The kiosk
    is untrusted/public — no HSM at the kiosk; it executes pre-generated APDU scripts and
    does remote supervisor auth (kms.bnprs.ai). Owner: bruid-iperso (010).
  data_prep: >
    "dPrep" — transforms raw identity/biometric/card data into the perso data blob (central,
    74-field) or hex (instant, 52-field), computes PIN/CVV/track, and drives key derivation
    via the HSM. Sits before both cPerso and iPerso. Owner: bruid-dprep (008).


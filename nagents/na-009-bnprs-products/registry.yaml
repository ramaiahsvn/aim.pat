# ============================================================
#  AGENT REGISTRY — na-009-bnprs-products
# ============================================================
#  ISO 8583 DE-style codes. One byte = DE01 to DEFF (255 max).
#  IMMUTABLE: once a code is assigned it is NEVER reused,
#  even if the agent is retired or deleted.
# ============================================================

group:
  id: "na-009"
  name: "bnprs-products"
  description: "BNPRS product agents — one agent per product line"
  max_agents: 255

registry:
  - code: "001"
    name: "bpr1002-mgate"
    label: "bpr1002-mgate"
    role: "BPR mGate Product Agent — API and Mobile Gateway (BPR1002)"
    path: "001-bpr1002-mgate"
    status: "active"
    created_at: "2026-05-28"
    created_by: "bnprs"

  - code: "002"
    name: "bpr1003-mpos"
    label: "bpr1003-mpos"
    role: "BPR mPos Product Agent — Mobile Point of Sale / PatPOS (BPR1003)"
    path: "002-bpr1003-mpos"
    status: "active"
    created_at: "2026-05-28"
    created_by: "bnprs"

# ---- CODE ALLOCATION RULES ---- #
# DE01–DE3F  (001–063)  Core product agents
# DE40–DE7F  (064–127)  Product R&D and prototypes
# DE80–DEBF  (128–191)  Product support and tooling
# DEC0–DEFF  (192–255)  Reserved for future use

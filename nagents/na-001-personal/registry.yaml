# ============================================================
#  AGENT REGISTRY — na-001-personal
# ============================================================
#  ISO 8583 DE-style codes. One byte = DE01 to DEFF (255 max).
#  IMMUTABLE: once a code is assigned it is NEVER reused,
#  even if the agent is retired or deleted.
# ============================================================

group:
  id: "na-001"
  name: "personal"
  description: "Personal productivity, life management, day-to-day automation"
  max_agents: 255

registry: []

# ---- CODE ALLOCATION RULES ---- #
# DE01–DE3F  (001–063)  Core personal agents
# DE40–DE7F  (064–127)  Extended personal tools
# DE80–DEBF  (128–191)  Integrations and connectors
# DEC0–DEFF  (192–255)  Reserved for future use

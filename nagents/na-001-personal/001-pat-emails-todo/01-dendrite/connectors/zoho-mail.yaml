id: connector-zoho-mail
name: "Zoho Mail"
type: mcp-connector
protocol: mcp
version: "1.0"

accounts:
  - email: "ramaiah@bnprs.in"
    mcp_server: "zoho-ramaiah"
    credentials_path: "~/.zoho-mail-mcp/ramaiah@bnprs.in.json"
  - email: "info@bnprs.in"
    mcp_server: "zoho-info"
    credentials_path: "~/.zoho-mail-mcp/info@bnprs.in.json"
  - email: "hr@bnprs.in"
    mcp_server: "zoho-hr"
    credentials_path: "~/.zoho-mail-mcp/hr@bnprs.in.json"
  - email: "accounts@bnprs.in"
    mcp_server: "zoho-accounts"
    credentials_path: "~/.zoho-mail-mcp/accounts@bnprs.in.json"

connection:
  server: "https://mail.zoho.com/api"
  mcp_server_path: "01-dendrite/zoho-mail-mcp/index.js"
  auth:
    type: oauth2
    scopes:
      - ZohoMail.messages.READ
      - ZohoMail.messages.CREATE
      - ZohoMail.messages.UPDATE
      - ZohoMail.folders.READ
      - ZohoMail.tasks.ALL

capabilities:
  - list_messages
  - get_message
  - send_message
  - create_draft
  - move_message
  - list_folders
  # Tasks (to-do) — Zoho Mail Tasks API, /api/tasks/me
  - list_tasks
  - get_task
  - create_task
  - update_task
  - complete_task
  - delete_task

priority: high
rate_limit: 60/min

notes: >
  Custom MCP server wrapping Zoho Mail REST API (incl. Tasks API /api/tasks/me).
  Auth: run `node auth.js` per account in zoho-mail-mcp/.
  Credentials stored in ~/.zoho-mail-mcp/<email>.json (git-ignored).
  IMPORTANT: the ZohoMail.tasks.ALL scope was added after initial auth — each
  account must be RE-AUTHORISED (re-run auth.js) so its refresh token carries the
  tasks scope, otherwise task tools return an OAuth scope-mismatch error.

# Priority Rules — pat-emails-todo

threshold:
  auto_act: 0.8
  ask_user: 0.5
  defer: 0.3

# Email category priority tiers
email_priority:
  high:
    categories: [business, legal, finance]
    description: "Client, partner, legal, financial emails — act within the hour"
    auto_escalate: true
    label: "Action Required"

  medium:
    categories: [personal]
    description: "Family, friends, personal matters"
    auto_escalate: false
    label: "Action Required"

  low:
    categories: [marketing, newsletters, promotions]
    description: "Subscriptions, offers, newsletters — batch or archive"
    auto_escalate: false
    label: "Reference"

  none:
    categories: [spam, unknown]
    description: "Flag for review, never act autonomously"
    auto_escalate: false
    label: "Review"

# Task extraction priority (from emails)
task_priority:
  critical:
    triggers: ["urgent", "asap", "immediately", "deadline today", "overdue"]
    max_wait: "0s"
  high:
    triggers: ["by end of day", "eod", "by tomorrow", "action required", "please respond"]
    max_wait: "1h"
  medium:
    triggers: ["this week", "follow up", "let me know"]
    max_wait: "24h"
  low:
    triggers: ["when you get a chance", "no rush", "fyi"]
    max_wait: "1w"

conflict_resolution:
  strategy: priority_then_fifo
  max_parallel_tasks: 5
  preemption_allowed: true

actions:
  send_email:
    description: "Send an email via Gmail, Outlook, or Zoho Mail"
    requires_confirmation: true
    target: "dendrites/connectors/"
    accounts: [gmail, outlook, zoho_mail]

  create_draft:
    description: "Save a draft email without sending"
    requires_confirmation: false
    target: "dendrites/connectors/"

  create_todo:
    description: "Write extracted tasks to the to-do list file"
    requires_confirmation: false
    target: "02-cell-body/planning/todo/"
    output_format: yaml

  create_summary:
    description: "Write a thread or triage summary to deliverables"
    requires_confirmation: false
    target: "07-axon-terminals/deliverables/"
    output_types: [md, txt]

  apply_label:
    description: "Apply labels/folders to emails in any account"
    requires_confirmation: false
    target: "dendrites/connectors/"

  notify_user:
    description: "Surface triage results or summaries to the user"
    requires_confirmation: false
    target: "notifications/"

  update_memory:
    description: "Persist a learning or preference to long-term memory"
    requires_confirmation: false
    target: "08-memory/long-term/"

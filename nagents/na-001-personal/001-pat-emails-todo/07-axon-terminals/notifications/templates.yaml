# Notification Templates — Neurotransmitter Shapes

templates:
  triage_summary:
    channel: chat
    trigger: "after_triage"
    message: |
      Inbox Triage — {account} ({date})
      High priority  : {high_count} emails
      Medium priority: {medium_count} emails
      Low / archive  : {low_count} emails
      Tasks extracted: {task_count}
      Top actions: {top_actions}

  draft_ready:
    channel: chat
    trigger: "draft_created"
    message: |
      Draft ready — To: {recipient} | Account: {account} | Subject: {subject}
      {draft_body}
      Reply: Send / Edit / Discard

  tasks_extracted:
    channel: chat
    trigger: "tasks_extracted"
    message: "{task_count} tasks extracted from emails. Saved to planning/todo/\n{task_list}"

  stale_alert:
    channel: chat
    trigger: "stale_thread_detected"
    message: "Stale thread ({days_ago}d): {subject} from {sender} [{account}] — Reply, Archive, or Ignore?"

  needs_input:
    channel: chat
    message: "I need your input on: {question}"
    options: "{choices}"

  error_report:
    channel: chat
    message: "Issue encountered: {error}. {suggested_fix}"
    severity: "{level}"

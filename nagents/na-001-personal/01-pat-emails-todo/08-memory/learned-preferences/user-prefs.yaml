preferences:
  communication:
    verbosity: concise
    tone: professional
    preferred_language: en
    asks_followup: false
    sign_off: "Regards,\nRamaiah"

  email_behaviour:
    show_draft_before_send: true
    auto_archive_newsletters: true
    stale_thread_threshold_days: 30
    preferred_triage_time: "morning"
    accounts_order: [gmail, outlook, zoho_mail]

  formatting:
    document_style: professional
    bullet_style: dashes
    preferred_output_format: md

  workflow:
    reviews_plans: true
    auto_save_preference: always
    likes_progress_updates: false

  learning_rules:
    min_observations: 3
    decay_rate: 0.1
    override: "user_explicit"

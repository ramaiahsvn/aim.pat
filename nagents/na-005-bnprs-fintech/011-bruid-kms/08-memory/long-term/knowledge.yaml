  - id: mem-003
    type: technical_knowledge
    content: >
      HSM integration decision (owner-approved 2026-07-16): NO runtime dlopen
      of libBprHsmHost.dll (Qt app's QLibrary approach is retired). Phase 1a:
      statically compile bnprs/host/*.c into the Rust binary via cc crate
      (out-of-tree build, zero writes to backend repo) + bindgen over bnprs.h.
      Phase 1b end-state: pure-Rust FM client speaking the fm_cmd protocol
      directly over MD_Initialize/MD_SendReceive FFI; C stubs (~1.6k LoC)
      remain the verification oracle in integration tests. Vendor libethsm is
      the only permitted non-Rust runtime dependency.
    created_at: "2026-07-16"
    last_accessed: "2026-07-16"
    access_count: 1
    confidence: 0.95
    source: "session-20260716"
    tags: [hsm, ffi, bindgen, static-link, security]


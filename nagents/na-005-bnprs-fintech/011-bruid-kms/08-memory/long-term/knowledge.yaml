  - id: mem-005
    type: project_context
    content: >
      Progress (as of 2026-07-16, all on ai_dev of trp1003.phsm.kms.fe).
      Living status doc = docs/rust-migration/ROADMAP.md (source of truth).
      DONE: Phase 0 (kms-core security primitives), Phase 1a (kms-hsm
      bridge; real.rs FFI compile-verified in linux/amd64 Docker), Phase 2
      shell + ALL parity views: login/dashboard/key-mgmt + Users & Roles,
      Audit Log (filter), PIN Block (ISO 9564-1 format-0 encode/decode +
      PEK import; decode returns masked+length only), Settings (persisted
      ~/.bnprs-kms/config.json; audit at ~/.bnprs-kms/audit.log — every
      service now writes audit). HSM trait gained delete_principal /
      change_password / decrypt_pinblock (mock + real.rs). PHASE 2 COMPLETE
      2026-07-16: CAVV + QiChallenge ported (generate_cavv /
      encrypt_qi_challenge on HsmBackend; real.rs returns
      CKR_FUNCTION_NOT_SUPPORTED — both were optional dlopen symbols with no
      static-API equivalent yet), panels added to Key Management view. Qt
      src/ + ENTIRE CMake build system DELETED (src tests cmake resources
      packaging scripts CMakeLists.txt CMakePresets.json .clang-format);
      README rewritten for Rust/Tauri. Repo is now Rust-only. Role-aware nav.
      PHASE 3 COMPLETE 2026-07-16: KMS setup + master-key ceremony (RM ch.3).
      HsmBackend master-key ops (generate/export/import components, activate,
      state; MasterKeyState enum). Mock = real by-parts state machine
      (XOR-split components reconstruct key); real.rs wires generate_lmk/
      export_lmk, CKR_FUNCTION_NOT_SUPPORTED for import/activate/state.
      CeremonyService = guided single-ceremony state machine, generate+import
      modes, DUAL/TRIPLE CONTROL (part N authorised by SON — mirrors pHSM host
      per-part SO login), RunMasterKeyCeremony-gated. Generate-mode components
      written to trusted-path file ~/.bnprs-kms/ceremony/<label>-partN.key
      (0600), NEVER returned to webview. KmsSettings (name/identifier/
      ceremony_parts) on AppConfig. UI: Master-Key Ceremony view (SO stepper).
      PHASE 4a COMPLETE 2026-07-16: Key Administration Module (RM ch.5).
      HsmBackend generate_key(label, key_bits) for symmetric working keys
      (mock deterministic; real.rs → zmk_generate). kms-domain::catalog =
      Issuer/KeyContext/KeyEntry/Catalog models (serde, KCV tail only, NO
      secrets), KeyNature (ZMK/TMK/TPK/ZPK/PEK/BDK/CVK/KEK/DEK) + KeyAlgorithm
      (TDES2/3,AES128/256) with reviewed nature→algorithm matrix in code.
      CatalogService: issuer+context CRUD (ManageIssuers), key create/edit-
      dates/revoke/suspend/set-default/delete (ManageKeys/ViewKeys), KEY
      VERSIONS via version-qualified HSM labels LABEL#vN (distinct KCVs; new
      version NOT auto-default), cascade-delete guards. Catalog PERSISTED to
      ~/.bnprs-kms/catalog.json (saved per mutation). UI: Key Administration
      view (issuers→contexts master-detail + keys table). 79 rust tests,
      clippy clean, app builds+runs. On-disk state now: config.json,
      audit.log, catalog.json, ceremony/*.key (all under ~/.bnprs-kms/).
      DEFERRED to Phase 4b: by-parts symmetric create, RSA/ECC, transport
      keys, multi-key import/export (container/CT6/OGDC), MKDATA, key-profiles
      export. PHASE 5a COMPLETE 2026-07-16: CA & certificate management (RM
      ch.5). kms-domain::ca = CertAuthority/CaKey/CaStore (all PUBLIC data —
      CA public keys not secret), CertScheme (13: Visa/MC/Girocard/JCB/Amex/
      Interac/UnionPay/Discover/ERCA/MSCA/MULTOS/NSPK/X509), HashAlgo,
      CaKeyStatus (Pending/Endorsed/Revoked). CaService: CA CRUD + CA
      public-key import (ManageCas=Admin; RID 10hex/index 2hex/modulus
      128-512hex/exp 3|65537 validation + display check value), SO1->SO2->SO3
      ENDORSEMENT workflow (triple control, in-order, inline SO auth like
      ceremony; Pending->Endorsed after 3rd), revoke/expiry/delete. Persisted
      ~/.bnprs-kms/ca.json. UI: CA & Certificates view (Admin-only). 85 rust
      tests, clippy clean. On-disk state: config.json, audit.log, catalog.json,
      ca.json, ceremony/*.key. DEFERRED 5b: PKCS#7 chains + consistency,
      issuer public-key certs (P10 request/import), per-scheme reports, real
      SHA check values, HSM load of endorsed keys. RBAC note: Endorse perm is
      SO-only but endorsement is DRIVEN by Admin session (ManageCas) with
      inline SO credential providing authority — same pattern as ceremony.
      Mock demo logins: operator/auditor (User store), admin/so1-3 (Admin
      store, also ceremony+endorsement SOs), password bnprs-demo.
      PHASE 6a COMPLETE 2026-07-16: server-side & ops (RM ch.6-9). kms-core
      OpsSettings (key_cache_enabled/size, log_retention_days) on AppConfig

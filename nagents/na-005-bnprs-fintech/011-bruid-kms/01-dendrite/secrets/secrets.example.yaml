# ============================================================
#  AGENT-SPECIFIC SECRETS — bruid-kms
# ============================================================
#  Copy this file to secrets.yaml and fill in real values.
#  secrets.yaml is git-ignored. NEVER commit real credentials.
#
#  Shared secrets (LLM keys, Slack, storage) live in:
#    ../../../../../../secrets/secrets.yaml   (repo root)
#  Only put agent-specific credentials here.
# ============================================================

# ---- CONNECTOR CREDENTIALS ---- #
# Add one block per connector this agent uses.

# Example: Google Sheets connector
google_sheets:
  service_account_json_path: "./credentials/gsheet-sa.json"
  spreadsheet_id: ""

# Example: Notion connector
notion:
  integration_token: "secret_..."
  database_id: ""

# Example: GitHub connector
github:
  personal_access_token: "ghp_..."
  repo: "owner/repo-name"

# Example: Custom internal API
internal_api:
  base_url: "https://api.internal.example.com"
  api_key: ""
  timeout_seconds: 30

# ---- AGENT-SPECIFIC OVERRIDES ---- #
# Override shared secrets for this agent if needed (e.g. different Slack channel)
slack:
  channel_id: ""                           # Channel this agent posts to

# ---- ENVIRONMENT ---- #
env: "development"                         # development | staging | production

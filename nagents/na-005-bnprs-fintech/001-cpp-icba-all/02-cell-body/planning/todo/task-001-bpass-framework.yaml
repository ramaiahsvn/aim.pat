# Task — bPass-ICBA TLV-Bitmap Framework

task:
  id: "task-001"
  subject: "Enhance bPass TLV-bitmap into a new ICBA framework (clean redesign)"
  description: >
    Evolve the bPass TLV-bitmap from the v1 QR-specific hardcoded parser
    (BprQR::patParseDecodedQRCode) into a general, data-driven, bounds-safe
    encode/decode framework for ICBA — NEW code under src/BprICBA/. Clean
    redesign of the wire format (BER-TLV lengths, chained extensible bitmap,
    modality versions in header, structured Record object). v1 spec + analysis:
    08-memory/long-term/bpass/bpass-bitmap-v1-spec.md. v2 design:
    08-memory/long-term/bpass/bpass-icba-framework-v2-design.md.
  status: in_progress      # pending | in_progress | completed | blocked | on_hold
  status_note: "2026-05-30: design signed off (proposed defaults adopted); v2 codec implemented in src/BprICBA/bpass/ + tests 26/26 pass. Remaining: legacy serializer + wire into BprICBA (001.3)."
  priority: high
  created_at: "2026-05-30"
  assigned_to: null
  estimated_steps: 12
  tags: [bpass, tlv, bitmap, icba, codec, emv, biometrics, cpp17]


task:
  id: "task-002"
  subject: "Complete Visa (VSDC) central perso end-to-end — keys, AFL/records, ODA, lock"
  description: >
    A Visa VSDC instance was already installed and given 5/5 plaintext DGIs live on the UAT card
    (mem-020): INSTALL[make selectable] instance A0000000031010 from module A0000000031056, priv 00,
    params C900 -> 9000; applet SCP02 (same ISD key) -> 9000; DGIs 9115/0101/0201/0301/0401 accepted.
    What remained was keys (no Visa IMKs), AFL correctness, and lock. The Visa IMKs are now DELIVERED
    (bruid-dprep task-002) and the VSDC 2.9.2 perso manual is on disk (Resources/Perso Manual and LoA/).
    Apply the MasterCard lessons (keys-region-first ordering, finalize control, DEK-wrap) to Visa and
    produce a fully functional Visa card.
  status: pending
  priority: high
  created_at: "2026-07-20"
  source: "rnd-cperso na-100/003 delegation; Visa IMKs delivered 2026-07-20; VSDC 2.9.2 manual received"
  tags: [visa, vsdc, central-perso, live-perso, key-dgis, afl, oda, set-status, vis-1.6.3, vcps-2.2.4]

# ---- Prereqs / inputs (all now available) ----
prereqs:
  visa_imks:     "bruid-dprep task-002 — Visa IMKs loaded to keystore under Visa labels + UDK derivation seam"
  vsdc_manual:   "Resources/Perso Manual and LoA/VSDC2.9.2_Personalization_Manual_v1.3.pdf (AFL/record layout, DGI order)"
  visa_profile:  "OutputFile_..._A0000000031010_DI_VisaDebit.xml (VIS 1.6.3 / VCPS 2.2.4)"
  card_state:    "UAT Gemalto multi-app card — Visa GP ISD A000000003000000, ISD key C277BA/VISA2/KVN01, VSDC pkg A00000000310 loaded"
  mc_reference:  "mem-023/024 — keys-first ordering, drop last-block marker mid-stream, ISD-directed SET STATUS finalize"

subtasks:
  - id: "task-002.1"
    subject: "Encrypted Visa key DGIs — DGI 8000 (KeyAC||KeyI||KeyC) + 9000 KCVs, DEK-wrapped under SKUDEK"
    detail: >
      Consume bruid-dprep's Visa UDK-AC/SMI/SMC; build the encrypted key DGIs, DEK-wrapped (3DES-ECB
      no-pad under SKUDEK = the SCP02 session DEK), keys-first per the MC ordering lesson (mem-023).
      SPEC CORRECTION (VSDC 2.9.2 manual §3.8/§3.9, read 2026-07-20): Visa uses a SINGLE DGI 8000 =
      KeyAC||KeyI||KeyC (3x16B) + DGI 9000 = KCV(AC)||KCV(I)||KCV(C) (3x3B) — NOT the 8000/8001 +
      9000/9001 inferred from MC. No A006/A016/9103 (those are MC-specific). The applet validates 8000
      against 9000 (KCV check) — our 9000 is computed from the same UDKs, so it is self-consistent.
    status: done   # 2026-07-20 — IMPLEMENTED + offline-verified. build_visa_key_dgis() added to
                   # persoengine/apps/perso-live-visa/main.cpp: derives Visa UDKs from the keystore
                   # (VISA-IMK-AC/SMI/SMC, EMV Option A), builds DGI 8000 via seq::build_key_dgi (each key
                   # DEK-wrapped) + DGI 9000 (kcv3 of each UDK), and PREPENDS them keys-first before the
                   # config/record DGIs. Compiles+links (perso-live-visa, PERSOENGINE_BUILD_PCSC=ON).
                   # Offline crypto verification (test DEK + real Visa UDKs): 8000 len=0x30/round-trips to
                   # KeyAC/KeyI/KeyC; 9000 len=0x09, KCVs=3E425F (matches task-002.3); 9000 validates 8000.
                   # LIVE run against the card deferred to task-002.4. PAN currently synthetic (4000...02) —
                   # .4 sets it to the card's real Track2/5A PAN. Keys by label; no key values stored.
    priority: high

  - id: "task-002.2"
    subject: "Fix AFL / SFI-record grouping per the VSDC 2.9.2 manual"
    detail: >
      The current 0201/0301/0401 record split is a GUESS (mem-020). Rebuild the SFI records + AFL from
      the VSDC 2.9.2 perso manual and the Visa VPA profile: correct SFI/record numbering, template-70
      layout, and the AIP/AFL (tag 82/94) so GPO returns a valid AFL that drives READ RECORD. Verify
      against the manual's worked example, as was done for the MC GFCX17.0 manual §10.
    status: done   # 2026-07-20 — AFL/GPO/records spec-anchored (was a guess). DELIVERABLE:
                   # 07-axon-terminals/deliverables/2026-07-20-visa-vsdc-record-afl-layout.md (VSDC 2.9.2 §3.14
                   # GPO answers + §3.16 [SFI][rec] + VPA profile; manual worked example). KEY FINDINGS: AIP+AFL
                   # live in the GPO-ANSWER DGIs (9104 contact / 9115/9117 qVSDC), NOT in a readable record;
                   # AFL = 080101001001040018010201 (SFI1 r1 | SFI2 r1-4 | SFI3 r1-2, r1 in SDA); AIPs 3800/0020/
                   # 2020 from the profile. IMPLEMENTED in perso-live-visa: replaced the bare "9115 AIP=0020" with
                   # 9102 FCI + 9104/9115/9117 GPO answers (AIP+AFL) + 0101(70>61) + 0201(SFI2)/0301(SFI3, SDA).
                   # Compiles+links. Offline-verified: AIP byte1.bit7=0 + contactless byte2.bit6=1 all OK; AFL
                   # decodes to valid SFI/record ranges. Per-card data (PAN/expiry/PSN/name/tracks/ODA certs) +
                   # full qVSDC data bundle + live GPO/READ-RECORD confirmation deferred to task-002.4.
    priority: high

  - id: "task-002.3"
    subject: "Visa ODA — ICC RSA keypair + 9F46 (self-signed test issuer for UAT)"
    detail: >
      Reuse perso::oda (proven for MC): generate the ICC RSA keypair, build the ICC PK cert (9F46) +
      9F47/9F48 per EMV Book 2 §6.4, DEK-wrap the ICC private key. For UAT use a SELF-SIGNED test issuer
      key + a Visa TEST CAPK and regenerate the issuer PK cert DGI so the card chains self-consistently
      (same UAT shortcut as MC — no bureau dependency). Confirm the Visa profile's ODA tag set (8F/90/
      9F32/9F46/9F47/9F48/9F49/9F4A) and DGI placement from the VSDC manual.
    status: done   # 2026-07-20 — Visa ODA reuses perso::oda UNCHANGED (proven for MC). PLACEMENT confirmed from
                   # VSDC 2.9.2: §3.12 = ICC RSA key in CRT form -> DGI 8201-8205 (CA=(Q-1)modP, CD2, CD1, CQ=Q,
                   # CP=P), ISO 9797-1 method-2 pad, 3DES-ECB DEK-wrapped under SKUDEK — IDENTICAL to MC; 8301-8305
                   # = ICC PIN RSA key (same form). §3.16 = public ODA tags 8F/90/9F32/92/9F46/9F47/9F48/9F4A live
                   # in the SFI3 SDA readable record (9F49 only for DDA-not-CDA). Visa RSA max: CA 1984 / issuer
                   # 1976 / ICC 1952 bits, 32-bit steps, ICC<=issuer. IMPLEMENTED: build_visa_icc_privkey_dgis()
                   # in perso-live-visa generates the ICC keypair (full-length CRT) + emits 8201-8205 keys-first.
                   # Compiles+links. VERIFIED by the engine oda tests (9/9 pass): IccPrivateKeyCrtDgis,
                   # UatTestCaChainSelfConsistent (self-signed test CA->issuer->ICC chain recovers), Certificate
                   # RecoversAndHashVerifies. REMAINING for .4: place the cert tags in SFI3 rec1-2 with per-card
                   # PAN/expiry, and split across records (issuer+ICC certs exceed the 255-byte STORE DATA Lc, so
                   # SFI3 rec1/rec2 per the AFL) + a Visa test CAPK on the terminal side (rnd-mpos, task-004.5).
    priority: medium
    depends_on: "task-002.2"

  - id: "task-002.4"
    subject: "Finalize/lock the Visa instance (SET STATUS) + full live perso"
    detail: >
      Assemble the full Visa perso stream (keys-first, then config/records, ODA, PIN), run perso-live-visa
      --commit end-to-end, then lock via the finalize path that worked for MC (drop the mid-stream
      last-block marker; ISD-directed SET STATUS to PERSONALIZED/SECURED after re-SELECT+re-auth on the
      ISD). Self-verify like the MC card: GPO -> AIP/AFL, AFL-driven READ RECORD returns PAN/cardholder/
      track2/cert chain, and VERIFY PIN -> 9000. Card left additive (BIXAPP/MC instance untouched).
    status: in_progress   # 2026-07-20 — LIVE on the UAT card: 14/14 Visa DGIs accepted (perso-live-visa --commit).
                          # Card reachable (ACS ACR39U), Visa GP ISD A000000003000000 VISA2-authenticates (seq
                          # 0005), INSTALL[make selectable] A0000000031010 (params C900) -> 9000, applet SCP02 ->
                          # 9000. STORE DATA keys-first ALL 9000: 8000 (Visa UDKs), 9000 (KCVs — card validated the
                          # keyset), 8201-8205 (ICC RSA CRT priv key), then 9102 FCI, 9104/9115/9117 GPO answers
                          # (AIP+AFL), 0101/0201/0301 records. The 9102 6A80 was a FORMAT bug (had 6F/84 wrapper;
                          # fixed to A5 proprietary template {50,87,9F38} per §3.13) -> now 9000. The MC secret-
                          # loading lesson transferred: Visa keys loaded FIRST TRY. Card left UNLOCKED, additive.
                          # REMAINING for full functionality (not yet done): (a) PIN DGIs 8010 (ISO2, DEK-wrapped)
                          # + 9010 (PTC||PTL) per §3.10/3.11; (b) ODA public certs 9F46/9F47/9F48 + 8F/90/9F32/92
                          # in SFI3 rec1-2 (record split for >255B) with real PAN; (c) FINALIZE — applet last
                          # STORE DATA P1.bit8=1, then Card Manager -> GP SECURED (SET STATUS 80F08007/80F0800F);
                          # (d) self-verify GPO/READ RECORD/VERIFY PIN. NOTE: card->SECURED is CARD-WIDE +
                          # IRREVERSIBLE (disables applet loading for MC/BIX too, forces C-MAC) — needs explicit
                          # user go-ahead before running. bpr.cpp 9102 fix committed with this milestone.
    priority: high
    depends_on: ["task-002.1", "task-002.2", "task-002.3"]


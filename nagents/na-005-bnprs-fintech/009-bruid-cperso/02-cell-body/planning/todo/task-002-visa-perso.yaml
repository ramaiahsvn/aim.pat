  - "--commit is destructive to the card; read-only preflight first; stop-on-first-error so a partial card never continues."
  - "PCI: synthetic/test PANs only; never commit real cardholder data or key values; fail-closed key-value gate on every commit; ramaiahsvn token for bpr.cpp."


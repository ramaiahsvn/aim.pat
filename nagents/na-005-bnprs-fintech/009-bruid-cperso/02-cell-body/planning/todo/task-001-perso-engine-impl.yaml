         encrypted framing uses a synthetic value (no DEK ciphertext committed). 4 tests; suite 58/58 green."
      - "2026-07-15 — .spi + MC profile RE-PROVIDED (Resources/MC_EMV_Perso.spi + Card Profiles/MC/
         PFL_..._Addon_PersoTool_1_MCC.xml). Full DGI map decoded from the Operas Spi4MLB2 trace and recorded:
         rnd-cperso 08-memory/long-term/thales/mc-advance-dgi-map.md (canonical 31 plaintext + 10 encrypted
         DGIs in P2 order). CORRECTS the prior finding:"
      - "  * MC_EMV_Perso.spi is an IDEALIZED generic-CPS flow (only 0101/0201/0301/0401 + 8000/8010/A001/8201,
           plain EMV tags in template 70). Our build_dgi_0101.. builders port it FAITHFULLY."
      - "  * BUT the real M/Chip Advance card needs ~31 plaintext + ~10 encrypted DGIs mixing generic record DGIs
           (0201/0301/0302/0401-0404) WITH M/Chip Advance proprietary DGIs (A002 CRM, A012/A022, B0xx, 9xxx, 0E01)

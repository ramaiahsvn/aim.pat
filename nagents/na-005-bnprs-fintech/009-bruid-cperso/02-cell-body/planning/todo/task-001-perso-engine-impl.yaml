# ---- READY TO BUILD — full perso hand-off (rnd-cperso, 2026-07-14) ----
# See 01-dendrite/inputs/2026-07-14-uat-perso-handoff.md — ALL mechanisms VALIDATED LIVE on the UAT card:
#   perso-entry INSTALL params = C9 05 0111000105 (pkg A0000000180F000001833032, module A0000000180F0000018303,
#   instance A0000000041010, priv 12); SELECT->9000; applet SCP02 (gp --connect); STORE DATA DGI A002 -> 9000.
# No unknowns/blockers. Build = port BprDataPrep/PersoScripts/MC_EMV_Perso.spi driven with UAT keys (ISD C277BA/
# VISA2, IMK 82E136). CVK/PVK NOT needed. Full DGI oracle = Operas/THALES MDA traces (48 sessions, 270 STORE DATA).

# ---- Input channel: CENTRAL (user, 2026-07-13) ----
# cperso's input is dprep's 74-field CENTRAL blob, which dprep builds from the EMBOSSING FILE DIRECTLY
# (Tri-Badge PURE V3.0 fixed-width — dprep task-001.5, already built). This is the CENTRAL channel; it does
# NOT use the DPI / G&D data-provider / DEK-decrypt path — that is the INSTANT channel (bruid-iperso, MENTA/
# Pointman vendor kiosk). Same shared engine core (card / gp / sequencer) as iperso; only the front-door
# data source differs: embossing file (central) vs parsed DPI record (instant).

subtasks:
  - id: "task-001.1"
    subject: "P4 — card::ICardChannel (PC/SC via BprPcSc) + gp::SecureChannel (SCP02)"
    detail: >
      PC/SC transport with 61xx/6Cxx handling; SCP02 INIT-UPDATE/EXT-AUTH per the Gemalto trace; session
      keys via dprep's IHsmClient. Verify: trace-replay emitted APDUs == recorded Gemalto/TechTrex sequence.
    status: pending
    priority: high

  - id: "task-001.2"
    subject: "P5 — perso::Sequencer + audit (batch)"
    detail: >
      Drive SELECT CM → SCP02 → DELETE → INSTALL[for load&make] → per-applet STORE DATA (DGI blocks) →
      read-back verify → audit. Configurable stop-on-error; never silently retry a partial card. Audit is
      PAN/PIN/key-free (mask PAN). Align with existing qiscript_central_* pipeline + LOCK (INS 0xF0).
      STORE DATA per EMV CPS (rnd-cperso emv-cps-reference.md): 84 E2, ONE DGI per command, P2 = sequence;
      the LAST STORE DATA transitions the applet to PERSONALIZED + closes the channel (moves a pre-installed
      M/Chip instance from 6999 to selectable). Map SW: 9315 KCV-fail, 9580 out-of-sequence, 6A88 bad DGI.
    status: pending
    priority: high

  - id: "task-001.3"
    subject: "P6 — Calypso key path + real-HSM adapter (BprHsm / Operas KMS)"
    detail: >
      Calypso/TRANSLINK derivation behind IHsmClient; swap SoftHSM2 -> BprHsm (FM/HOST/HostJNI) or Operas
      KMS behind the seam. Keys never leave HSM in plaintext.
    status: pending
    priority: medium

  - id: "task-001.4"
    subject: "Confirm STORE DATA P1=0x60 block semantics from the trace before finalising GP module"
    detail: "Decode a few P1=0x60 blocks (encrypted key/DGI vs proprietary) — architecture §8 open item."
    status: pending
    priority: low


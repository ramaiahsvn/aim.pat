      PAN/PIN/key-free (mask PAN). Align with existing qiscript_central_* pipeline + LOCK (INS 0xF0).
      STORE DATA per EMV CPS (rnd-cperso emv-cps-reference.md): 84 E2, ONE DGI per command, P2 = sequence;
      the LAST STORE DATA transitions the applet to PERSONALIZED + closes the channel (moves a pre-installed
      M/Chip instance from 6999 to selectable). Map SW: 9315 KCV-fail, 9580 out-of-sequence, 6A88 bad DGI.
    status: in_progress
    priority: high
    progress:
      - "2026-07-15 — CLEAR data-record DGI builder DONE (bpr.cpp 9373bc5). perso::sequencer::PersoRecord +
         build_dgi_0101/0201/0301/0401 + build_clear_data_dgis; each DGI = EMV TLVs wrapped in template 0x70;
         pan_to_bcd packs PAN right-F-padded to 8 bytes. Product config defaults ported from MC_EMV_Perso.spi
         [INIT]; per-card fields from dprep. include/persoengine/sequencer.hpp + src/sequencer.cpp +
         tests/sequencer_test.cpp (5 tests). Full suite 54/54 green."
      - "2026-07-15 — STORE DATA APDU emitter DONE (bpr.cpp efe0bd6). build_store_data_apdus(StoreDataBlock[]):
         CLA 80 / INS E2, ONE DGI per cmd (encode_dgi = id||len||value), P2 = block sequence, P1 = 0x60 for
         DEK-encrypted DGIs else 0x00; CLA stays unsecured 0x80 (SCP02 layer promotes to 84 + C-MAC); guards
         >256 blocks. KAT: reproduces real THALES MDA trace APDUs (B010, A202) byte-for-byte at recorded P2;
         encrypted framing uses a synthetic value (no DEK ciphertext committed). 4 tests; suite 58/58 green."
      - "2026-07-15 — .spi + MC profile RE-PROVIDED (Resources/MC_EMV_Perso.spi + Card Profiles/MC/
         PFL_..._Addon_PersoTool_1_MCC.xml). Full DGI map decoded from the Operas Spi4MLB2 trace and recorded:
         rnd-cperso 08-memory/long-term/thales/mc-advance-dgi-map.md (canonical 31 plaintext + 10 encrypted
         DGIs in P2 order). CORRECTS the prior finding:"
      - "  * MC_EMV_Perso.spi is an IDEALIZED generic-CPS flow (only 0101/0201/0301/0401 + 8000/8010/A001/8201,
           plain EMV tags in template 70). Our build_dgi_0101.. builders port it FAITHFULLY."
      - "  * BUT the real M/Chip Advance card needs ~31 plaintext + ~10 encrypted DGIs mixing generic record DGIs
           (0201/0301/0302/0401-0404) WITH M/Chip Advance proprietary DGIs (A002 CRM, A012/A022, B0xx, 9xxx, 0E01)
           carrying proprietary tags (DFxx/Cx/Dx from the ADDONS profile). Our 0201/0301/0401 builders ARE real
           trace DGIs (a valid subset) — NOT wrong. DGI 0101 is NOT written on this card (AID/FCI via A0xx config)."
      - "2026-07-15 — 3-CLASS DGI ARCHITECTURE decided (rnd-cperso mc-advance-dgi-map.md): (1) TLV record DGIs
         (0201/0301/0302/0E01) build from tags; (2) config DGIs (A0xx/B0xx/9xxx) = batch-invariant product
         constants → emit verbatim; (3) encrypted key DGIs (8010/820x/8000/A006/A016) → DEK-wrap via HSM.
         Avoids hand-inferring 41 fixed-field builders (single-sample byte-alignment risk)."
      - "2026-07-15 — TLV RECORD DGIs DONE, byte-exact (bpr.cpp 2ccc7a0). Replaced the idealized 0101/0201/0301/
         0401 builders with the REAL M/Chip Advance records decoded from the trace: build_dgi_0201 (SFI2/contact),
         0301 (SFI3/contactless), 0302 (name/DDOL/track2/service). Corrected config to real values (CDOL1 39B
         incl 5F2A/9F4C/9F21/9F7C; IAC B450840000; contact vs contactless CVM/IAC differ) + exact trace tag
         order. PersoRecord now separates per-card inputs from product config. 3 KATs reproduce the trace's
         0201/0301/0302 DGIs byte-for-byte. Removed 0101 (not written on this card) + 0401 (RSA cert record ->
         cert path). Suite 58/58 green. NOTE: test fixtures carry the trace card's test-range PAN/track2 +
         EMV config lists (CDOL/CVM/IAC) — non-secret; key-value gate clean."
      - "NEXT: (a) config-DGI verbatim product table (A0xx/B0xx/9xxx — classify invariant vs per-card: A001/9000
         are per-card; CRM/risk params invariant); (b) RSA cert DGIs 0401/0403/0404/A001 (per-card, needs ICC
         keypair + issuer PK cert = engine RSA, task-004); (c) encrypted key DGIs via IHsmClient+SCP02 (DEK-wrap);
         (d) live driver SELECT->SCP02->INSTALL->STORE DATA->SET STATUS (task-001.1 card channel)."


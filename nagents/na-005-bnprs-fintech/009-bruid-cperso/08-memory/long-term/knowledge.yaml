  - id: mem-012
    type: technical_knowledge
    content: >-
      GS.* DLLs in BprMces2 are NOT removable (investigated 2026-06-11). The
      MCES2 reader contract IReaderBase (defined in ChipCodingBaseLib.dll) has
      SendAPDU(GS.Apdu.APDU, out ChipResponse) — GS.Apdu.APDU is its parameter
      type, so any host-reader transmit needs GS.Apdu. GS.Apdu.dll itself
      depends on GS.HexLibrary.dll (where ToHexString lives; used live in
      ChipCoding.cs). And Bpr.Card.Core.dll (mandatory framework ref)
      transitively pulls ALL FOUR: GS.Apdu, GS.HexLibrary, GS.PCSC, GS.SCard —
      they load at runtime regardless of our source. Only way to drop GS is to
      not use the host reader (Direct mode), which reintroduces the PC/SC
      contention bug. So: keep the DLLs. DEAD-CODE CLEANUP done instead
      (working-tree only, NOT committed; C# is Windows-only so CI-runner
      verified only): in BprMces2PersoCC removed dead leftovers from the
      native-direct migration — Apdu_Qi_Write.Pat_ApduExchange,
      SupervisorAuthentication (body was fully commented, no caller), the
      GetQiScript_Instant_Perso P/Invoke (declared-unused), fields
      oCardResponse/oCodingInterfaceAdmin/_isGemaltoAdmin, deleted
      Scripts/Apdu.Qi.AdminKey.cs (+ its <Compile> entry in both csprojs),
      dropped `using GS.PCSC` from Apdu.Qi.Write.cs. Live GS source surface now:
      GS.Apdu + GS.Util.Hex in Apdu.Qi.Write.cs (HostTransmit), one vestigial
      `using GS.PCSC` in Main.QiPersoScript.cs (only uses IReaderBase; left as-is).
      Braces balanced; ChipResponse/PMProcessResult still used live. csproj
      Reference set unchanged (GS.Apdu + GS.HexLibrary stay).

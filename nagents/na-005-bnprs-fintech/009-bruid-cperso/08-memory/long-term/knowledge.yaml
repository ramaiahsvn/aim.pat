      PC/SC-enumerable), so the native open hangs/contends. FIX = inject the
      transport. NATIVE (bpr.cpp src/BprCardQi, agent na-005/002): new export
      StartEncoding_Instant_Perso_Mces2(qiCode,qiCodeSize,embData,size,
      PatApduTransmitFn transmit,void* ctx,_isT0,_isReperso,*errCode). New
      callback typedef PatApduTransmitFn(const char* apduHex,char* respHexBuf,
      int bufSize,void* ctx)->int (0=ok); PatHost_Transmit_Common routes APDUs
      through file-static g_hostTransmitFn (registered via RAII HostTxScope for
      the call, NOT re-entrant). Slot sentinels PAT_SLOT_TP9000(-1),
      PAT_SLOT_HOST(-2); _qiread_datafield now dispatches PAT_SLOT_HOST ->
      host callback. _Mces2 derives SUPERVISOR_KEY locally via
      BprCrypt::patReadAdminKey_WithoutCard(USER_CHALLENGE) (NOT the KMS K3
      challenge that Direct uses) per user instruction. EXISTING
      StartEncoding_Instant_Perso_Direct LEFT UNTOUCHED (user: "do not touch
      existing method"; the earlier ask to strip its #ifdef _DEBUG line was

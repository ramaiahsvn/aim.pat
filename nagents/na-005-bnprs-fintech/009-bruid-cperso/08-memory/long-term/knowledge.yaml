      32-bit process. Working combo = x86 C# + 32-bit libBprCardQi.dll. CI
      build.ps1 correctly builds /p:Platform=x86 — leave as-is. Native
      libBprCardQi builds BOTH windows-32 and windows-64 (mingw, make
      BprCardQi-windows-32/64) but the 64-bit is moot until a full x64 MCES2
      framework exists.

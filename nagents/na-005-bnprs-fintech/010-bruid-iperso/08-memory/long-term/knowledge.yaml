  - id: mem-003
    type: feedback
    content: >
      2026-07-21: WHERE iPerso Windows binaries are BUILT vs RUN (user directives — two separate rules).
      (1) The KIOSK (Windows perso host with the TP9000 feeder) is EXTERNAL + UNTRUSTED — NEVER run a
      build/toolchain there; it only EXECUTES pre-built exes (matches the iperso threat model: untrusted public
      kiosk). (2) Do NOT copy BRUID/bpr.cpp SOURCE onto the WINRUNNER EC2 either (user declined this 2026-07-21
      when asked) — that box is shared build infra and the source should not land there ad-hoc. So Windows
      binaries that NEED the bpr.cpp source (e.g. perso-live-visa) are cross-compiled LOCALLY on pat-m4p with
      mingw-w64, producing a self-contained exe that is then delivered to the kiosk. (The mingw route already
      works: the perso-tp9000-probe.exe was cross-compiled this way, mem-001/mem-002.) The winrunner
      (i-03563f4ad6ca9abf0 'patwin-runner', acct 891963159778, ap-south-2, profile bnprs, SSM-only; has git +
      MSVC VS2022BT + VS-bundled CMake/Ninja + choco) stays reserved for the sanctioned MCES2 GitLab CI (which
      clones its OWN repo) — not for ad-hoc bpr.cpp builds. BITNESS: the kiosk TP9000.dll is 32-bit (the win32
      probe loaded it), so build perso-live-visa x86 static.
      **Why:** BRUID is patented IP; keep its source off shared/build boxes. **How to apply:** for any Windows
      perso binary, cross-compile on pat-m4p (mingw i686, static) and ship only the exe; never scp/clone bpr.cpp
      to the winrunner or the kiosk. Deps to solve locally for perso-live-visa: OpenSSL libcrypto + pugixml +
      persoengine_bprcrypt for mingw (glog -> stderr shim, winscard from mingw). BITNESS CORRECTION 2026-07-21:
      the kiosk TP9000.dll is **64-BIT** (the win64 probe loaded it — user confirmed) — NOT 32-bit as first
      assumed. So perso-live-visa is built **x86_64** (x86_64-w64-mingw32, static). GOTCHA hit + fixed: when
      cross-building OpenSSL for x64, do a CLEAN extract — re-tarring over a prior i686 build dir leaves stale
      i386 .obj files that `make` re-archives (symptom: libcrypto has leading-underscore i386 symbols ->
      undefined refs at x64 link). Build each arch in its own fresh dir. [[mem-001]] [[mem-002]]

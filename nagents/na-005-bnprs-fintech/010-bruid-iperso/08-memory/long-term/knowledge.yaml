      open()=GetTPKStatus(feed only if no card)->Card_Insert->IC_ContactOn->IC_PowerOnEx(cno=0,nMode=2 EMV)
      capturing real ATR; transmit()=IC_Input (raw, no chaining); eject()=Card_EjectEx; reject()=Card_Control
      (0x36 reject-bin); close()=IC_PowerOff+FreeLibrary; errors via Get_Status. Then the channel:
      persoengine/card_tp9000.{hpp,cpp} = perso::driver::Tp9000Channel : ICardChannel, transmit() copies
      BprPcScChannel's 61xx/6Cxx loop VERBATIM; ctor feeds+EMV-resets (throws on fail); atr()/eject()/reject()
      exposed. CMake: option PERSOENGINE_BUILD_TP9000 (WIN32-only, default OFF) -> persoengine_tp9000 +
      perso-tp9000-probe (read-only feed+ATR+SELECT+eject; --reject-test). NO engine-core change (tlv/profile/
      sequencer/oda untouched). VERIFIED: macOS default build green, 94/94 tests, tp9000 target absent when OFF.
      FACTORY DONE (002.3): shared apps/common/card_transport.hpp = perso::app::CardTransport wraps either
      channel behind a plain ICardChannel&, label() shows reader/ATR, and the feeder DISPOSITION is RAII —
      default divert-to-reject, mark_good()=>eject, applied in the dtor (correct on every return + exceptions;
      no-op for PC/SC). TP9000 side gated by PERSOENGINE_HAVE_TP9000 so no Win32 leak on macOS. perso-live-visa
      wired: --commit + --transport pcsc|tp9000 (any order), mark_good only after 'VISA PERSO COMPLETE'.
      Verified on pat-m4p: perso-live-visa builds green; bad --transport rejected; tp9000 on a non-TP9000 build

# Task — Perso Engine implementation: instant / public-kiosk perso (split model)
#
# Handed off 2026-07-04 from rnd-cperso (na-100/003, planner). See
# 08-memory/long-term/perso-engine-handoff.md and rnd-cperso's canonical design docs.

task:
  id: "task-001"
  subject: "Implement instant perso: central APDU script-gen (HSM) + untrusted public-kiosk executor"
  description: >
    bruid-iperso owns the INSTANT issuance path. DataPrep + key derivation happen CENTRALLY (HSM present)
    and emit self-contained, single-use, card-bound APDU perso scripts; those are sent to a PUBLIC KIOSK
    (no HSM) that executes them with remote supervisor auth (kms.bnprs.ai). Reuses the shared engine core
    in bpr.cpp/src/BprCardEmv (from dprep + cperso). The trust boundary between central and kiosk is the
    defining design constraint.
  status: pending
  priority: high
  created_at: "2026-07-04"
  source: "rnd-cperso na-100/003 delegation (task-003)"
  tags: [perso-engine, iperso, instant, kiosk, apdu-script, scp02, supervisor-auth, bpr-cpp, pci]

subtasks:
  - id: "task-001.1"
    subject: "Central: APDU perso script generator (trusted, HSM present)"
    detail: >
      Reuse gp::SecureChannel (SCP02) + perso::Sequencer to EMIT a serialized single-use APDU script for
      one card (not live transmit). Consume dprep's 52-field instant hex + IHsmClient. Pre-compute SCP02
      wrapping / STORE DATA so the kiosk needs NO key material. Bind script to card (challenge/serial) —
      anti-replay. SAD stays central.
      STORE DATA per EMV CPS (rnd-cperso emv-cps-reference.md): 84 E2, ONE DGI per command, P2 = sequence;
      DGI >= 0x8000 encrypted under session DEK; the LAST STORE DATA personalizes + closes the channel.
    status: pending
    priority: high
    live_trigger: >
      2026-07-13: a blank MC GP JavaCard (AID A0000000041010) was presented for perso; this emitter is
      the missing piece to generate a loadable script. The engine core (SCP02 session-key/C-MAC, UDK,
      PIN block) is built and unit-verified; what is absent is the Sequencer that assembles STORE DATA +
      SCP02-wrapped APDUs into a serialized script. Build the emitter + a dry-run mode against KATs now,
      so it is ready the moment keys land.
    blocked_by:
      - "bruid-dprep (008) task-001.4 — MC-ADDONS DGI grouping fix (data blob currently DGIs:0)."
      - "na-003/007-bnprs-grc-kms — SCP02 ISD keys KVN=01 (label+KCV) + diversification method, and
         CVK/PVK/PIN-TK. Requested 2026-07-13 (grc-kms 01-dendrite/inputs/handoff-na005-008-perso-engine-bureau-keys.md).
         Structure/dry-run can proceed on KATs before keys arrive; live SCP02 wrap needs the ISD key."

  - id: "task-001.2"
    subject: "Edge: public-kiosk APDU script executor (untrusted, no HSM)"
    detail: >
      ICardChannel (PC/SC via BprPcSc) replays the script. Remote supervisor auth: GET CHALLENGE ->
      kms.bnprs.ai (mTLS k3_fleet_pfx fleet cert, 60s timeout) -> VERIFY AUTH. Re-perso via
      GetInsertOrUpdateData_Pat; LOCK new card; read-back verify. Android POS platform backends.
    status: pending
    priority: high

  - id: "task-001.3"
    subject: "Kiosk threat model + hardening (public, untrusted device)"
    detail: >
      No secrets at rest; scripts single-use + card-bound; supervisor auth gates every issuance;
      altered-script detection; fail-closed on network loss within the 60s window.
    status: pending
    priority: high

  # ---- Pointman/MENTA vendor-kiosk instant path (input: 01-dendrite/inputs/2026-07-13-pointman-kiosk-integration-v1.3.md) ----
  # A SECOND instant-issuance context alongside the BRUID public-kiosk model above. SAME engine core
  # (script generator 001.1 + executor 001.2); DIFFERENT surrounding integration.
  # SCOPE (user, 2026-07-13): Part A (kiosk frontend) + Part B (MENTA<->machine SOAP, WS-Security, DPI receive,
  # DUI send) are built by ANOTHER team member on our side — NOT iperso. iperso owns only the personalization
  # script (bpr.cpp/src/BprCardEmv). MENTA = perso bureau (upstream); Pointman = kiosk hardware vendor.
  - id: "task-001.4"
    subject: "Pointman/MENTA boundary: parsed DPI record -> perso script -> perso result for DUI"
    detail: >
      In the vendor-kiosk flow, MENTA (bureau) sends the DPI RequestPerso; the Part A/B team member handles the
      SOAP transport + WS-Security, and bruid-dprep decrypts (DEK) + parses it (dprep task-001.6). iperso
      RECEIVES that parsed perso record, runs the script generator (001.1) + executor (001.2) to personalize
      the card, and RETURNS the perso outcome that populates the team member's DUI StatusUpdate
      (PTM_CP_0014 success / PTM_CP_0013 fail). Define the internal hand-off contract (parsed-record in,
      perso-result out) with the Part A/B owner. iperso does NOT build the SOAP / frontend / WS-Security / DUI wire.
    status: pending
    priority: high
    depends_on: "bruid-dprep (008) task-001.6 (DPI decrypt+parse, instant channel)"

depends_on:
  - "bruid-dprep (008) task-001: 52-field instant hex + IHsmClient crypto seam (central)"
  - "bruid-dprep (008) task-001.6: DPI (G&D data-provider) decrypt+parse -> parsed record (Pointman/MENTA path)"
  - "Part A/B (kiosk frontend + MENTA<->machine SOAP / WS-Security / DUI) — ANOTHER team member on our side, NOT iperso"
  - "bruid-cperso (009) task-001: shared gp::SecureChannel + perso::Sequencer engine core"
  - "na-003 KMS / kms.bnprs.ai: remote supervisor auth endpoint + fleet certs"

guardrails:
  - "Kiosk is PUBLIC/untrusted — no key material or SAD at rest on the kiosk."
  - "APDU scripts single-use and card-bound (anti-replay); supervisor auth gates every issuance."
  - "Never store key VALUES — labels/IDs only. Central HSM does all crypto."

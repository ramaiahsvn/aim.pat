# Task — Pointman TP9000 card-feeder transport (kiosk executor's card channel)
#
# Handed off 2026-07-21 from rnd-cperso (na-100/003, planner). Implements rnd-cperso
# task-005-tp9000-transport.yaml. See dendrite input 01-dendrite/inputs/2026-07-21-tp9000-transport-handoff.md
# and rnd-cperso knowledge mem-019. The TP9000 is the Pointman kiosk's card-handling hardware — the
# physical transport this agent's kiosk executor (task-001.2) runs the SCP02 APDU perso script over.

task:
  id: "task-002"
  subject: "Implement a Pointman TP9000 ICardChannel transport in the perso engine"
  description: >
    The perso engine (bpr.cpp/src/BprCardEmv/persoengine) transmits over ONE transport today: PC/SC
    (BprPcScChannel). The Pointman TP9000 is a motorized card FEEDER whose vendor DLL (TP9000.dll) drives
    the chip contacts DIRECTLY, not via winscard/pcsclite. Add a second ICardChannel — Tp9000Channel —
    wrapping the existing (partial) bpr.cpp Tp9000Card wrapper, so perso-live / the kiosk executor can
    drive a feeder, selectable alongside PC/SC. No engine-core changes; drop-in behind the ICardChannel
    seam (card.hpp:29). WINDOWS-ONLY — bench-tested on the Windows perso host, not pat-m4p.
  status: in_progress   # 2026-07-21 — core + app factory implemented; TRANSPORT PROVEN ON REAL HARDWARE via the
                        # read-only probe (TeamViewer: DLL load, EMV ATR, MC SELECT 9000+FCI, eject — see task-002.5).
                        # Only Step 2 (live Visa perso on the host) + optional 002.4 remain.
                        # DECISION (user 2026-07-21): DO NOT modify the legacy tp9k (Tp9000Card) — it works
                        # for BprCardQi/BprCardEmv. Instead a SELF-CONTAINED _v2 wrapper was added. DONE: 002.1 (v2
                        # wrapper), 002.2 (Tp9000Channel), 002.3 (CMake option + probe app + shared --transport
                        # factory wired into perso-live-visa). In progress: 002.4 (eject/reject primitives done;
                        # kiosk-executor read-back->eject/reject decision remains). Pending: 002.5 (Windows-host bench
                        # — cannot run on pat-m4p). Default macOS build stays green (94/94 tests; perso-live-visa
                        # builds; tp9000 target absent unless PERSOENGINE_BUILD_TP9000=ON on WIN32).
  priority: medium
  created_at: "2026-07-21"
  source: "rnd-cperso na-100/003 delegation (task-005); user request 2026-07-21"
  tags: [tp9000, pointman, transport, icardchannel, feeder, iperso, kiosk-executor, windows-only, perso-engine, scp02, v2-wrapper]

# ---- Implementation approach (DECIDED 2026-07-21) ----
approach:
  legacy_untouched: >
    The existing bpr.cpp/src/BprPcSc/tp9k/tp9k.{h,cpp} (class Tp9000Card) is LEFT AS-IS — it is in use by
    BprCardQi/BprCardEmv. We do NOT finish/refactor it. (An earlier edit to it was reverted per user.)
  v2_wrapper: >
    New self-contained wrapper bpr.cpp/src/BprPcSc/tp9k/tp9k_v2.{h,cpp} — class bprpcsc::tp9k::Tp9000CardV2.
    RAII; applies the vendor spec properly: EMV cold reset (IC_PowerOnEx nMode=2) with real ATR capture,
    GetTPKStatus for card position (not deprecated CheckFeeder), explicit eject (Card_EjectEx) vs reject-bin
    divert (Card_Control 0x36), Get_Status error detail. Used ONLY by the perso engine.
  files_added:
    - "bpr.cpp/src/BprPcSc/tp9k/tp9k_v2.h + tp9k_v2.cpp (Tp9000CardV2 — Windows-only)"
    - "bpr.cpp/src/BprCardEmv/persoengine/include/persoengine/card_tp9000.hpp + src/card_tp9000.cpp (Tp9000Channel : ICardChannel)"
    - "bpr.cpp/src/BprCardEmv/persoengine/apps/common/card_transport.hpp (perso::app::CardTransport — --transport factory + RAII eject/reject disposition)"
    - "bpr.cpp/src/BprCardEmv/persoengine/apps/tp9000-probe/main.cpp (read-only feed+ATR+SELECT+eject smoke probe)"
    - "persoengine/CMakeLists.txt: option PERSOENGINE_BUILD_TP9000 (WIN32-only; builds persoengine_tp9000 + perso-tp9000-probe; links PERSOENGINE_HAVE_TP9000 into perso-live-visa/perso-live)"
  files_modified:
    - "bpr.cpp/.../apps/perso-live-visa/main.cpp (uses the factory; --transport pcsc|tp9000; mark_good on success)"
  build_status: >
    macOS default build VERIFIED green (94/94 tests; perso-cli + libpersoengine + perso-live-visa built; no
    tp9000 target with the option OFF). WINDOWS PATH COMPILE-VERIFIED 2026-07-21 via mingw-w64 cross-compile
    against real Windows headers: tp9k_v2.cpp + card_tp9000.cpp + tp9000-probe/main.cpp compile clean on BOTH
    32-bit (i686) and 64-bit (x86_64); only a benign -Wcast-function-type on the GetProcAddress cast. Legacy
    tp9k.cpp does NOT cross-compile (needs MFC/afx.h) — proves it is untouched + v2 avoids MFC. Not yet done:
    full persoengine CORE Windows build (deps) + the physical feeder bench (task-002.5, blocked on hardware).
    clang-on-macOS flags windows.h/BYTE in the tp9000 files: EXPECTED noise.

# ---- Scope confirmation ----
scope:
  confirmed_2026_07_21: >
    User CONFIRMED this is the INSTANT/KIOSK (iperso) transport — NOT cperso. bruid-iperso owns it.
    Corroborated by the vendor spec (POINTMAN TP9000.DLL is a card printer/encoder = instant-issuance
    device) and this agent's existing Pointman kiosk integration (input 2026-07-13). The TP9000 is the
    transport for the kiosk executor (task-001.2).

# ---- Vendor spec (authoritative API reference — READ FIRST) ----
vendor_spec:
  doc: "bpr.cpp/docs/Specification for Nuvia TPK DLL_4 1 2 5(E)_20240708.doc"
  title: "POINTMAN — Card Printer Standard User Library Specifications (TP9000.DLL) API, rev 4.1.2.5 (2024-07-08)"
  key_api_facts:
    - "IC_PowerOnEx(cno=0, *rxSize, rxData, nMode=2) -> ATR; nMode 1=ISO / 2=EMV. USE EMV for payment perso (wrapper currently calls plain IC_PowerOn, no mode)."
    - "IC_Input(cno=0, tx, *rxSize, rx) = one APDU exchange (raw; NO auto-chaining — 61xx/6Cxx handling is ours). IC_MultiAPDU batches N APDUs but per-APDU is better for STORE DATA error localization."
    - "GetTPKStatus is the current status call; CheckFeeder is DEPRECATED ('Not using for TPK') — move the wrapper's CheckFeeder call to GetTPKStatus."
    - "Feed/eject: Card_Insert/InsertEx, Card_EjectEx (Full-eject), IC_Eject(0)=front/hopper, CheckStackerCard. cno sockets: 0=Main, 1=SIM, 2/3=SAM."
  contactless_finding: >
    CONTACT-ONLY scope confirmed. The RF module in this DLL rev is Mifare block-ops only (RF_Read/Write/
    Authenticate/Increment/Decrement + RF_PowerOnEx/ATS) — there is NO ISO14443-4 (T=CL) APDU-exchange
    function. Contactless EMV perso would need a newer Pointman DLL or IC-socket routing — escalate only
    if dual-interface perso is required.

# ---- Prereqs / inputs ----
prereqs:
  vendor_doc:    "bpr.cpp/docs/Specification for Nuvia TPK DLL_4 1 2 5(E)_20240708.doc — READ FIRST (authoritative API)"
  design:        "rnd-cperso task-005-tp9000-transport.yaml (canonical design + open questions)"
  wrapper:       "bpr.cpp/src/BprPcSc/tp9k/tp9k.{h,cpp} — class Tp9000Card (partial: transmit works; ATR/Open/Close stubbed)"
  seam:          "persoengine/include/persoengine/card.hpp — ICardChannel (transmit -> ApduResponse, resolves 61xx/6Cxx)"
  pcsc_sibling:  "persoengine/{include/persoengine/,src/}card_bprpcsc.{hpp,cpp} — the PC/SC channel to mirror"
  cmake_pattern: "persoengine/CMakeLists.txt:41 — PERSOENGINE_BUILD_PCSC option block to mirror"
  proven_stream: "this agent's / bruid-cperso MC+Visa STORE DATA streams — run unchanged over the feeder"

subtasks:
  - id: "task-002.1"
    subject: "Self-contained v2 wrapper (Tp9000CardV2) — NOT a rewrite of the legacy Tp9000Card"
    detail: >
      DECISION (user 2026-07-21): do NOT touch the legacy tp9k (in use by BprCardQi/BprCardEmv). Added a
      new self-contained wrapper bpr.cpp/src/BprPcSc/tp9k/tp9k_v2.{h,cpp} = class bprpcsc::tp9k::Tp9000CardV2
      (RAII, Windows-only). open() = GetTPKStatus (feed only if no card) -> Card_Insert -> IC_ContactOn ->
      IC_PowerOnEx(cno=0, nMode=2 EMV) capturing the real ATR. transmit() = IC_Input (raw, no chaining).
      eject() = Card_EjectEx; reject() = Card_Control(0x36) reject-bin divert; close() = IC_PowerOff +
      FreeLibrary. Vendor errors pulled via Get_Status into lastError(). Loads TP9000.dll next to the exe.
    status: done   # 2026-07-21 — implemented (tp9k_v2.h/.cpp). Windows-only; bench-pending (task-002.5).
    priority: high

  - id: "task-002.2"
    subject: "Tp9000Channel : ICardChannel in the perso engine"
    detail: >
      persoengine/{include/persoengine/,src/}card_tp9000.{hpp,cpp}: class perso::driver::Tp9000Channel
      wrapping Tp9000CardV2. transmit() = Tp9000CardV2::transmit + the SAME 61xx (GET RESPONSE) / 6Cxx
      (re-issue exact Le) resolution loop as BprPcScChannel::transmit() (copied verbatim). ctor does the
      feed+EMV cold reset (throws on failure); atr() exposes the captured ATR; eject()/reject() surface the
      feeder lifecycle. NO edits to tlv/profile/sequencer/oda.
    status: done   # 2026-07-21 — implemented (card_tp9000.hpp/.cpp), mirrors card_bprpcsc verbatim. macOS
                   # default build verified green (94/94 tests); the tp9000 path itself is Windows-only (002.5).
    priority: high
    depends_on: "task-002.1"

  - id: "task-002.3"
    subject: "Build wiring (CMake option + probe app) + live-app transport factory"
    detail: >
      DONE: (a) option PERSOENGINE_BUILD_TP9000 (WIN32-only, default OFF) builds persoengine_tp9000
      (tp9k_v2.cpp + card_tp9000.cpp) + a read-only smoke app perso-tp9000-probe (feed+ATR+SELECT+eject;
      --reject-test exercises the reject bin). (b) SHARED factory apps/common/card_transport.hpp — class
      perso::app::CardTransport wraps either BprPcScChannel or Tp9000Channel behind a plain ICardChannel&,
      exposes a display label() (reader/ATR), and carries the feeder DISPOSITION as RAII: default = divert to
      reject bin; mark_good() => eject as good; applied in the destructor so it is correct on every return
      path AND on exceptions (no-op for PC/SC). The TP9000 side is gated by PERSOENGINE_HAVE_TP9000 (set by
      CMake when BUILD_TP9000 is ON) so no Win32 header leaks into the macOS/Linux build. (c) perso-live-visa
      wired: parses --commit + --transport pcsc|tp9000 (any order), builds via the factory, marks good only
      after "VISA PERSO COMPLETE". VERIFIED on pat-m4p: perso-live-visa builds green (PC/SC, TP9000 off);
      --transport bogus -> clear reject; --transport tp9000 on a non-TP9000 build -> "rebuild with
      -DPERSOENGINE_BUILD_TP9000=ON on Windows". perso-live can adopt the same factory (CMake already wires it).
    status: done   # 2026-07-21 — factory + perso-live-visa --transport done and macOS-verified; Windows link pending 002.5.
    priority: medium
    depends_on: "task-002.2"

  - id: "task-002.4"
    subject: "Feeder lifecycle for instant issuance (batch/kiosk semantics)"
    detail: >
      Per-card feed->perso->verify->eject (not a fixed reader). PRIMITIVES DONE: Tp9000Channel ctor feeds +
      powers; eject() (good) and reject() (divert to bin) implemented. REMAINING: wire into the kiosk
      executor (task-001.2) — run the perso stream, read-back QA BEFORE the eject decision (self-verify
      GPO/READ RECORD/VERIFY PIN as in the MC/Visa proofs), eject-good vs reject on any failure. A failed
      card must NEVER be ejected as good. Map to the instant-perso trust model (central script-gen->kiosk exec).
    status: in_progress   # eject/reject primitives done; executor read-back-then-eject/reject decision remains.
    priority: medium
    depends_on: "task-002.2"

  - id: "task-002.5"
    subject: "Bench-verify on the Windows perso host with a real TP9000"
    detail: >
      Cannot run on pat-m4p (Win32 DLL + physical feeder). COMPILE DE-RISKED 2026-07-21: cross-compiled the
      never-before-built Win32 transport with mingw-w64 against REAL Windows headers — tp9k_v2.cpp,
      card_tp9000.cpp, tp9000-probe/main.cpp ALL compile clean on BOTH i686 (32-bit) and x86_64 (64-bit);
      only a benign -Wcast-function-type on the GetProcAddress cast (same idiom the legacy tp9k uses). The
      legacy tp9k.cpp does NOT cross-compile (needs MFC/afx.h) — confirms it is untouched and my v2 avoids MFC
      by design. RUNBOOK DELIVERED: 07-axon-terminals/deliverables/2026-07-21-tp9000-bench-runbook.md (prereqs,
      vcpkg deps, CMake -DPERSOENGINE_BUILD_TP9000=ON, Step 1 read-only probe, Step 2 live Visa --transport
      tp9000, expected outputs vs mem-026, what-to-watch). STILL UNPROVEN until the bench (BLOCKED on Windows
      host + hardware): (1) the persoengine CORE built on Windows (pugixml/OpenSSL/glog — all prior live runs
      were macOS, so a Windows core build is new); (2) live feeder behaviour — feed, ATR, IC_Input RX sizing
      (512B), IC_PowerOnEx EMV-mode T=0/T=1, eject; (3) no PC/SC double-open contention. NEXT: run the runbook
      on the Windows perso host with a TP9000 + fresh OP_READY UAT card; capture stdout to this subtask.
    status: step1_passed   # 2026-07-21 — ✅ TRANSPORT VALIDATED ON REAL HARDWARE (TeamViewer, Windows perso host,
                      # win32 exe). perso-tp9000-probe output: TP9000.dll loaded+resolved; IC_PowerOnEx nMode=2 ->
                      # ATR 3B6E000080318066B0840C016E0183009000; SELECT MC card-mgr A000000004000000 -> SW=9000 +
                      # full 103B FCI (6F67 8408 A000000004000000 A55B ... 9F6E06 19810314 0100 9F6501FF); eject OK.
                      # => the whole Tp9000Channel path (DLL bind, feed, EMV cold reset, IC_Input transmit, response
                      # assembly, eject) WORKS end-to-end. NOT-a-bug: SELECT Visa A000000003000000 -> 6A82 (applet
                      # absent) — the card in the feeder is a DIFFERENT card than the multi-app UAT card: its ATR is
                      # 3B6E0000... (UAT multi-app card = 3BFE13) and it has NO Visa ISD. Looks MC-card-manager-only.
                      # REMAINING (Step 2, live perso): build perso-live-visa on the host (OpenSSL/pugixml via
                      # build-tp9000.ps1) + load the correct multi-app UAT card (3BFE13, Visa pkg) into the feeder,
                      # then perso-live-visa --commit --transport tp9000; expect 19/19 DGIs per mem-026.
    priority: medium
    depends_on: ["task-002.3", "task-002.4"]

# ---- Open questions (see task-005; two now resolved 2026-07-21) ----
open_questions:
  - "RESOLVED: iperso (instant/kiosk) transport, not cperso — user confirmed + vendor spec (printer/encoder)."
  - "RESOLVED: contact-only — the TP9000.dll RF module is Mifare-block-only (no T=CL APDU pipe)."
  - "OPEN: TP9000.dll bitness + version on the perso host (x86/x64) — must match the host process (spec is rev 4.1.2.5; confirm deployed DLL)."
  - "OPEN: T=0 vs T=1 and max APDU/RX buffer through IC_Input — use IC_PowerOnEx nMode=2 (EMV) for protocol negotiation; affects 61xx/6Cxx + extended length."

# ---- Guardrails ----
guardrails:
  - "No engine-core changes — Tp9000Channel sits behind ICardChannel; tlv/profile/sequencer/oda untouched."
  - "Windows-only: gate on WIN32 + PERSOENGINE_BUILD_TP9000, default OFF, so pat-m4p builds/tests stay hardware-free."
  - "PCI: synthetic/test PANs only; never log TRACK/PIN/CVV; DEK-wrapped key DGIs only; the transport does not change the data path."
  - "Feeder moves physical cards — a reject/divert path is mandatory so a failed card is never ejected as good."


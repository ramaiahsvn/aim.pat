# Task — Pointman TP9000 card-feeder transport (kiosk executor's card channel)
#
# Handed off 2026-07-21 from rnd-cperso (na-100/003, planner). Implements rnd-cperso
# task-005-tp9000-transport.yaml. See dendrite input 01-dendrite/inputs/2026-07-21-tp9000-transport-handoff.md
# and rnd-cperso knowledge mem-019. The TP9000 is the Pointman kiosk's card-handling hardware — the
# physical transport this agent's kiosk executor (task-001.2) runs the SCP02 APDU perso script over.

task:
  id: "task-002"
  subject: "Implement a Pointman TP9000 ICardChannel transport in the perso engine"
  description: >
    The perso engine (bpr.cpp/src/BprCardEmv/persoengine) transmits over ONE transport today: PC/SC
    (BprPcScChannel). The Pointman TP9000 is a motorized card FEEDER whose vendor DLL (TP9000.dll) drives
    the chip contacts DIRECTLY, not via winscard/pcsclite. Add a second ICardChannel — Tp9000Channel —
    wrapping the existing (partial) bpr.cpp Tp9000Card wrapper, so perso-live / the kiosk executor can
    drive a feeder, selectable alongside PC/SC. No engine-core changes; drop-in behind the ICardChannel
    seam (card.hpp:29). WINDOWS-ONLY — bench-tested on the Windows perso host, not pat-m4p.
  status: pending
  priority: medium
  created_at: "2026-07-21"
  source: "rnd-cperso na-100/003 delegation (task-005); user request 2026-07-21"
  tags: [tp9000, pointman, transport, icardchannel, feeder, iperso, kiosk-executor, windows-only, perso-engine, scp02]

# ---- Prereqs / inputs ----
prereqs:
  design:        "rnd-cperso task-005-tp9000-transport.yaml (canonical design + open questions)"
  wrapper:       "bpr.cpp/src/BprPcSc/tp9k/tp9k.{h,cpp} — class Tp9000Card (partial: transmit works; ATR/Open/Close stubbed)"
  seam:          "persoengine/include/persoengine/card.hpp — ICardChannel (transmit -> ApduResponse, resolves 61xx/6Cxx)"
  pcsc_sibling:  "persoengine/{include/persoengine/,src/}card_bprpcsc.{hpp,cpp} — the PC/SC channel to mirror"
  cmake_pattern: "persoengine/CMakeLists.txt:41 — PERSOENGINE_BUILD_PCSC option block to mirror"
  proven_stream: "this agent's / bruid-cperso MC+Visa STORE DATA streams — run unchanged over the feeder"

subtasks:
  - id: "task-002.1"
    subject: "Finish the legacy Tp9000Card wrapper (un-stub ATR / Open / Close)"
    detail: >
      In bpr.cpp/src/BprPcSc/tp9k: PatTp9000_ATR returns the real IC_PowerOn RX bytes (not the literal
      'Pointman ATR need to implement'); re-enable the IC_ContactOn/IC_PowerOn calls in PatTp9000_Open and
      Card_Eject in PatTp9000_Close (currently commented out); map feeder jam / no-card / power-on failure
      to distinct error codes (not a blanket -1). Windows-only; keep the existing __stdcall DLL binding.
    status: pending
    priority: high

  - id: "task-002.2"
    subject: "Tp9000Channel : ICardChannel in the perso engine"
    detail: >
      New persoengine/{include/persoengine/,src/}card_tp9000.{hpp,cpp}: class perso::driver::Tp9000Channel
      wrapping Tp9000Card. transmit() = IC_Input + the SAME 61xx (GET RESPONSE) / 6Cxx (re-issue exact Le)
      resolution loop as BprPcScChannel::transmit() — the vendor DLL is raw I/O, so chaining is ours.
      Expose atr() from IC_PowerOn and a connect() that does the feed+contact+power sequence. Guard sources
      on PERSOENGINE_BUILD_TP9000 + WIN32, mirroring the PERSOENGINE_BUILD_PCSC block in CMakeLists.txt.
      NO edits to tlv/profile/sequencer/oda.
    status: pending
    priority: high
    depends_on: "task-002.1"

  - id: "task-002.3"
    subject: "Transport factory in the live apps (perso-live / perso-live-visa / kiosk executor)"
    detail: >
      Replace the hard-coded `drv::BprPcScChannel ch;` (perso-live-visa/main.cpp:257) with a factory:
      --transport pcsc|tp9000 (default pcsc) returning std::unique_ptr<drv::ICardChannel>. Keep the
      -1==TP9000 slot convention for parity with MCES2 BprMces2Config.xml Perso/UserCardSlot. Everything
      downstream (open_ch, STORE DATA stream, SET STATUS, self-verify) is transport-agnostic and unchanged.
    status: pending
    priority: medium
    depends_on: "task-002.2"

  - id: "task-002.4"
    subject: "Feeder lifecycle for instant issuance (batch/kiosk semantics)"
    detail: >
      Per-card feed->perso->verify->eject (not a fixed reader): when to Card_Insert (per card), run the
      perso stream, read-back QA BEFORE eject (self-verify GPO/READ RECORD/VERIFY PIN, as in the MC/Visa
      proofs), then eject-good vs DIVERT-REJECT. Wire into the kiosk executor (task-001.2). A failed card
      must NEVER be ejected as good. Map to the instant-perso trust model (central script-gen -> kiosk exec).
    status: pending
    priority: medium
    depends_on: "task-002.2"

  - id: "task-002.5"
    subject: "Bench-verify on the Windows perso host with a real TP9000"
    detail: >
      Cannot run on pat-m4p (Win32 DLL). On the Windows host + a TP9000 + blanks: feeder status, insert,
      ATR, an end-to-end perso reusing the proven Visa/MC stream, self-verify, eject. Watch: IC_Input RX
      buffer sizing, T=0/T=1 vs PC/SC, and no double-open contention if a PC/SC session is also present.
    status: pending
    priority: medium
    depends_on: ["task-002.3", "task-002.4"]

# ---- Open questions (block build; confirm with user/vendor — see task-005) ----
open_questions:
  - "Confirm this is the INSTANT/kiosk (iperso) transport, not in-bureau (cperso) — sets scope."
  - "TP9000.dll bitness + version on the perso host (x86/x64) — must match the host process."
  - "Contactless perso via TP9000? Wrapper is contact-only (IC_*). If needed, obtain the vendor CL API."
  - "T=0 vs T=1 and max APDU/RX buffer through IC_Input — affects 61xx/6Cxx handling + extended length."

# ---- Guardrails ----
guardrails:
  - "No engine-core changes — Tp9000Channel sits behind ICardChannel; tlv/profile/sequencer/oda untouched."
  - "Windows-only: gate on WIN32 + PERSOENGINE_BUILD_TP9000, default OFF, so pat-m4p builds/tests stay hardware-free."
  - "PCI: synthetic/test PANs only; never log TRACK/PIN/CVV; DEK-wrapped key DGIs only; the transport does not change the data path."
  - "Feeder moves physical cards — a reject/divert path is mandatory so a failed card is never ejected as good."


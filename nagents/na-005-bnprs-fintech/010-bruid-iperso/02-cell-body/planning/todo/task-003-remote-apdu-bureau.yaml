  - id: "task-003.5"
    subject: "TLS + mutual auth (PROD) + connection-drop recovery"
    detail: >
      Wrap the socket in TLS 1.2+ with a client fleet cert (k3_fleet_pfx pattern; mutual auth enforced by the
      Bureau). Recovery: finalize (SET STATUS) is the LAST gated step, so a drop before it -> re-attemptable;
      after -> reject. Kiosk rejects the card on a lost link.
    status: done   # 2026-07-22 (bpr.cpp 76dd196). apps/common/tls.hpp (opt-in PERSOENGINE_HAVE_TLS): TlsContext
                   # over OpenSSL — loads the fleet cert/key, pins the fleet CA, TLS>=1.2, requires+verifies the
                   # peer cert BOTH ways (SSL_VERIFY_PEER|FAIL_IF_NO_PEER_CERT). ndjson_conn routes send/recv via
                   # SSL_write/read when a handle is attached (void* ssl_ keeps it OpenSSL-free when off; new
                   # accept_raw/release_fd wrap seam). bureau + agent gain --tls --cert --key --ca; CMake option
                   # PERSOENGINE_BUILD_TLS + persoengine_enable_tls() links OpenSSL::SSL. DROP RECOVERY: any
                   # bureau-link failure while a card is open -> agent rejects the card locally + link-lost result
                   # (never eject a card the bureau didn't confirm complete); SET STATUS SECURED stays the last
                   # gated step. VERIFIED on pat-m4p with a test fleet PKI (CA+bureau+kiosk+rogue): enrolled kiosk
                   # -> handshake OK + loop over TLS; plain agent -> TLS bureau rejected; ROGUE self-signed cert ->
                   # rejected (SSL_accept: certificate verify failed). Plain UAT loop unchanged; 95/95 tests green

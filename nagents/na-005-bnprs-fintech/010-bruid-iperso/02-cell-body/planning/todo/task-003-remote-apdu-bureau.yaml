# Task — Remote-APDU iPerso: Bureau drives perso live; Kiosk relays APDUs
#
# Opened 2026-07-22 (user redesign). iPerso becomes "cPerso with a remote card channel": the Bureau
# (trusted, on-prem HSM + engine) does dPrep and drives the WHOLE perso session live; the Kiosk is a thin,
# secure relay that only passes APDUs to the card (TP9000 v2 / PC/SC). Supersedes the self-contained
# script-emitter model (rnd-cperso task-005-era). Nothing sensitive lives at the Kiosk.


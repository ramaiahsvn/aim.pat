# ---- Model (user, 2026-07-22) ----
model:
  bureau: >
    Trusted server (pat-m4p for UAT; real bureau later) with the on-prem HSM + perso engine + keys. Receives
    the issuer input (embossing file OR DPI) submitted BY the Kiosk, does dPrep (decode/decrypt by key label),
    and drives the live perso (ISD SCP02 -> INSTALL -> STORE DATA -> verify -> SET STATUS) over a RemoteChannel.
  kiosk: >
    Thin relay. Connects OUT to the Bureau, submits the perso_request + input, opens its LOCAL card channel
    (TP9000 v2 feeder / PC/SC), and relays each APDU to the card (resolving 61xx/6Cxx locally). Holds no keys,
    no script, no data at rest. Ejects good / rejects failed on the Bureau's instruction.
  inputs: "Either a Tri-Badge embossing file (cPerso format) OR a MENTA DPI (iPerso format, AES-encrypted). Keys provided to the BUREAU separately (by label)."
  why_better: "kiosk holds nothing; bureau has full live control (abort on any bad SW; GPO-gate before SET STATUS); cPerso+iPerso converge on one engine w/ pluggable transport; no script-emitter needed."

# ---- Protocol (NDJSON over TCP; UAT token, PROD TLS+mTLS) ----
protocol:
  wire: "newline-delimited JSON, one object per line, over TCP. Kiosk connects OUT to the Bureau."
  security: "UAT = plain TCP + shared token in hello. PROD = TLS 1.2+ mutual auth (fleet client cert, k3_fleet_pfx pattern)."
  messages: "hello/hello_ack -> perso_request -> card_open/card_opened -> apdu/apdu_response (xN) -> card_finish/card_finished -> result. Full table in the kiosk build guide."
  chaining: "The Kiosk resolves 61xx/6Cxx LOCALLY (its BprPcScChannel/Tp9000Channel already do). The Bureau relays raw and sees FINAL responses."


# ---- Guardrails ----
guardrails:
  - "Keys are BUREAU-side only; never sent to the Kiosk. The Kiosk holds nothing at rest."
  - "The whole APDU channel is SAD — TLS in prod, no plaintext logging of PAN/track/CVV/PIN."
  - "Finalize (SET STATUS -> SECURED) is the LAST step, gated on a passing GPO — so a mid-session drop is recoverable/rejectable, never a silently-bad card."
  - "Bench/UAT bureau on pat-m4p; do not put bpr.cpp source on the kiosk (external)."


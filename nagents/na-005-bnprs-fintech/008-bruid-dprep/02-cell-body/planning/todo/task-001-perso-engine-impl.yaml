guardrails:
  - "Never store key VALUES — labels/IDs/ARNs only (PCI Card Production)."
  - "SAD (PIN block, track, CVV/ICVV/PVV) never persisted post-authorization (PCI-DSS Req 3.2)."
  - "Card profiles must carry key LABELS only — reject any profile with a populated key value."

# Task — Perso Engine implementation: data-prep modules + HSM/crypto planner
#
# Handed off 2026-07-04 from rnd-cperso (na-100/003, planner). See
# 08-memory/long-term/perso-engine-handoff.md and rnd-cperso's canonical design docs.

task:
  id: "task-001"
  subject: "Implement perso-engine data-prep modules (tlv/profile/embossing) + own the HSM/crypto planner"
  description: >
    bruid-dprep owns the data-preparation side of the C++ perso engine and the HSM/crypto planner.
    Production code lives in bpr.cpp/src/BprCardEmv (a verified P1/P2 prototype relocates there from
    trp1002.cperso.thales/persoengine). Integrate into bpr.cpp CMake/module conventions and extend
    with the HSM/crypto layer that central (009) and instant (010) perso consume.
  status: pending
  priority: high
  created_at: "2026-07-04"
  source: "rnd-cperso na-100/003 delegation (task-003)"
  tags: [perso-engine, dprep, tlv, profile, embossing, hsm, crypto, bpr-cpp, pci]

subtasks:
  - id: "task-001.1"
    subject: "Integrate relocated persoengine (P1 tlv+profile, P2 embossing) into bpr.cpp/src/BprCardEmv"
    detail: >
      Adopt the relocated prototype; wire into bpr_*_src.cmake, BprLicense, BprCrypt. Keep the verified
      unit tests (13 P1 + 8 P2) green. The embossing field map MUST stay in sync with the authoritative
      C# parser (BprDataPrep/EmbossingRecord.cs) — they are the same 75-field spec V3.0 layout.
    status: pending
    priority: high

  - id: "task-001.2"
    subject: "HSM/crypto planner — design + implement hsm::IHsmClient (dprep owns this)"
    detail: >
      PLAN DELIVERED 2026-07-04: 08-memory/long-term/hsm-crypto-planner.md (authoritative HSM plan).
      Forks RESOLVED (planner recommendation): dev/test backend = REUSE bpr.cpp BprCrypt (DES3/DES3CBC/
      patEncryptDecrypt_Pinblock) behind IHsmClient — SoftHSM2/PKCS#11 DROPPED (no new dep); prod backend
      = KMS adapter (kms.bnprs.ai) / central-HSM adapter behind the same seam; verification = public KATs
      first, issuer keys later. Build order (planner §6): P3a IHsmClient+BprCryptHsm (UDK+KCV, KAT-gated)
      -> P3b PIN block (ISO 9564-1 F0) -> P3c CVV/PVV (needs na-003/007 keys) -> P3d SCP02 session keys +
      C-MAC (trace-aligned) -> P3e KmsHsm prod adapter. KEYS BY LABEL ONLY (PCI).
    status: in_progress   # planning done; P3a DONE & verified; P3b (PIN block) next
    priority: high
    verification: "KAT anchor: 3DES-ECB(zeros, key 0123456789ABCDEF)=D5D44FF720683D0D (KCV D5D44F). UDK/SCP02/CVV/PVV from published spec vectors; issuer test keys/KCVs when available."
    deliverable: "08-memory/long-term/hsm-crypto-planner.md"
    progress:
      P3a_ihsmclient_udk_kcv: >
        DONE 2026-07-04 (bpr.cpp 74d3c1c). hsm::IHsmClient + BprCryptHsm in
        bpr.cpp/src/BprCardEmv/persoengine (include/persoengine/hsm.hpp, src/hsm.cpp,
        tests/hsm_test.cpp). Reuses BprCrypt DES3 via a persoengine_bprcrypt static lib
        (des.cpp+des3.cpp) — no new dep. derive_udk (EMV Option A) + kcv, keys by label.
        Verified: KAT anchor D5D44FF720683D0D / KCV D5D44F; 10 HSM tests; 31/31 suite total.
      P3d_scp02: >
        DONE 2026-07-04 (bpr.cpp a40714b) — done ahead of P3b/P3c because the Gemalto trace provides
        real SCP02 data. hsm::scp02 in persoengine: InitUpdate::parse (VERIFIED vs 7 real trace sessions
        — seq 0003..0007 KVN01, 0000..0001 KVN02), session_key (3DES-CBC, GP constants ENC 0182/MAC 0101/
        DEK 0181/RMAC 0102), card_/host_cryptogram (full-3DES CBC-MAC, ISO 9797-1 m2 pad), cmac (Retail
        MAC alg 3, ICV chaining). Parser + session-key CBC mechanics (DES3-KAT-anchored) + cryptogram/CMAC
        determinism VERIFIED (6 tests, 37/37 suite). FINDING: default GP key 40..4F does NOT reproduce the
        trace card cryptogram (got 64A3AA3841762195 vs 879A95BF3A518BB7) -> this card uses issuer/diversified
        keys. Byte-exact GP crypto verification is a DISABLED_ real-vector test, pending the KVN=01 ISD
        master key + diversification method from na-003/007. Fixed host challenge 0123456789ABCDEF.
      P3b_pin_block: >
        DONE 2026-07-04 (bpr.cpp d59b244). IHsmClient::pin_block_iso0 + BprCryptHsm::pin_block_clear_iso0:
        ISO 9564-1 Format 0 (PINfield 0|len|PIN|F-pad XOR PANfield 0000|12 PAN digits excl check digit),
        encrypt delegates to same DES3 as BprCrypt::patEncryptDecrypt_Pinblock (keys by label; transport-key
        values NOT duplicated into agent/persoengine — stay in BprCrypt). Verified: hand-computed format KAT
        PIN 1234/PAN 43219876543210987 -> 0412AC89ABCDEF67, 6/12-digit length nibbles, PAN-spacing invariance,
        encrypt==DES3(clear), length validation. 7 tests, 44/44 suite. SAD — never logged.
      P3c_cvv_pvv: "next (but BLOCKED on keys) — Visa CVV/iCVV/CVV2 + PVV; needs issuer CVK/PVK from na-003/007"
      P3e_kms_adapter: "pending — KmsHsm prod backend (kms.bnprs.ai / central HSM)"

  - id: "task-001.3"
    subject: "Produce the perso data blob/hex from parsed inputs"
    detail: >
      Merge embossing record + card profile -> resolved TLV/DGI blocks; assemble the 74-field central
      blob (-> bruid-cperso) and 52-field instant hex (-> bruid-iperso). Compute PIN block (ISO 9564-1 F0),
      CVV2/ICVV/PVV, TRACK1/TRACK2 via the HSM layer. PCI: SAD never persisted post-auth.
      Follow EMV CPS DGI rules (rnd-cperso 08-memory/long-term/thales/emv-cps-reference.md): DGI >= 0x8000
      (MSB set) is ENCRYPTED under the session DEK; keep clear DGIs < 0x8000; honor ordering — app key
      (8000) before its KCV (9000), PIN-related (9010) before PIN (8010). KCV = 3DES(key, 8x00)[:3].
    status: pending
    priority: medium

  - id: "task-001.4"
    subject: "BUG: MC-ADDONS profile yields DGIs:0 — fix DGI grouping in the P1 profile path"
    detail: >
      Triggered 2026-07-13 by a live MC card (AID A0000000041010). perso-cli on the real MC profile
      (Resources/Card Profiles/MC/PFL_20251009_071246508_Addon_PersoTool_1_MCC.xml) parses 124 tags +
      8 keys but reports "DGIs: 0" — McAddonsLoader / group_by_dgi() produces no DGI groups, so the
      data blob half of a perso script cannot be emitted for MC. Visa VPA path groups correctly, so
      the fault is MC-ADDONS-specific (tags carry no DGI assignment, or group_by_dgi filters them out).
      Fix so MC tags resolve into DGIs; add a unit test asserting DGI count > 0 against this real
      profile. This is the data-blob prerequisite for bruid-iperso task-001.1 (script emitter).
    status: pending
    priority: high
    blocks: "bruid-iperso (010) task-001.1 script generation for MC"

  # ---- dPrep input channels: TWO source formats, split by perso type (user, 2026-07-13) ----
  # Central perso <- embossing file directly (Tri-Badge PURE). Instant perso <- DPI (G&D data-provider v2).
  # Both loaders feed ONE internal perso-record model; everything downstream (profile merge, HSM, emit) is shared.
  # See input: 01-dendrite/inputs/2026-07-13-pointman-dpi-dataprep-v1.3.md
  - id: "task-001.5"
    subject: "CENTRAL channel: embossing-file loader (Tri-Badge PURE) — already built, keep as-is"
    detail: >
      Central perso (-> bruid-cperso) takes the embossing file DIRECTLY (Tri-Badge PURE V3.0 fixed-width)
      via the existing EmbossingParser (P2, verified). No DPI, no DEK, no signature. Feeds the 74-field
      central blob (task-001.3). No new work beyond keeping it green as the shared record model evolves.
    status: done
    priority: low

  - id: "task-001.6"
    subject: "INSTANT channel: DPI consumer (GdDataProviderLoader) for iperso"
    detail: >
      Instant perso (-> bruid-iperso) takes the MENTA DPI RequestPerso (G&D data-provider v2). Build the
      inbound consumer: (1) decrypt the xe:EncryptedData secure block (DEK by label, AES-256-CBC, iso2 padding,
      IV prepended in base64 CipherValue); (2) parse clear + secure perso-entity fields -> internal perso
      record -> the 52-field instant hex (task-001.3). Distinct front-door from the Tri-Badge PURE loader;
      same record model behind. NOTE: SOAP transport + WS-Security signature verification are handled by the
      Part A/B team member (NOT dprep) — dprep receives the DPI payload and decrypts/parses only.
      DONE 2026-07-14: implemented in bpr.cpp/src/BprCardEmv/persoengine — dpi.hpp/dpi.cpp
      (perso::dpi::GdDataProviderLoader): pugixml parse (namespace-prefix robust) -> DEK resolved BY LABEL via
      a DekResolver callback (never embedded, PCI) -> DpiRecord {metadata + clear + decrypted secure}. Verified
      against the real Resources/DPI sample (Python prototype byte-matched DecryptedDPIsecureblock.txt) + a
      self-contained C++ KAT (tests/dpi_test.cpp, 4 tests). 48/48 engine tests green.
    status: done
    priority: high
    depends_on: "task-001.7 (AES-256-CBC in crypto layer)"

  - id: "task-001.7"
    subject: "Crypto: add AES-256-CBC (iso2 padding) to the crypto seam"
    detail: >
      Engine crypto is 3DES-centric (BprCrypt). Add AES-256-CBC (decrypt path first) behind the same seam
      (in-tree OpenSSL available) to consume the DPI secure block. Handle IV-prepended CipherValue:
      base64-decode -> first 16 bytes = IV -> AES-256-CBC-decrypt remainder under the DEK.
      DONE 2026-07-14: AES-256-CBC via OpenSSL EVP (find_package(OpenSSL) + link OpenSSL::Crypto) + base64
      decoder, in dpi.cpp. iso2 label == PKCS7 unpad in this feed (EVP default). CipherValue = base64(16B IV || ct).
    status: done
    priority: high


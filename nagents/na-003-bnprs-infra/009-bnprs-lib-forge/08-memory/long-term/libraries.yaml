# =============================================================================
#  PUBLISHED-LIBRARY INDEX — bnprs-lib-forge (na-003 / 009)
# =============================================================================
#  Tracks what has actually been PUBLISHED to the GitLab Package Registry.
#  Registry host project: bpr1000/bnprs-libs (Generic Packages).
#  Identifier scheme:  package=<Lib>  version=<SemVer>  file=<platform>/<file>
#  Update this after every successful publish (immutable — never edit past entries).
# =============================================================================

registry:
  gitlab_url: "https://gitlab.bnprs.ai"
  api_base: "https://gitlab.bnprs.ai/api/v4"
  host_group: "BPR1000"              # GitLab group id 118 ("BPR1000 - License")
  host_project_path: "BPR1000/bpr1000.bnprs-libs"
  host_project_id: 230               # created 2026-05-30, private, packages enabled
  http_url: "https://gitlab.bnprs.ai/BPR1000/bpr1000.bnprs-libs.git"
  format: "generic"
  filename_slash_supported: true     # verified 2026-05-30 on CE 18.9 — <platform>/<file> works (no flattening needed)
  # Multi-SDK endpoints on the SAME project 230 (verified 2026-06-01): maven, nuget, go.
  # AUTH NOTE: Generic accepts the `PRIVATE-TOKEN` header; the NuGet endpoint does NOT —
  # it requires HTTP Basic auth (--user <username>:<token>, e.g. root:$GITLAB_PAT). 201 on Basic, 401 on header.
  nuget_push_endpoint: "https://gitlab.bnprs.ai/api/v4/projects/230/packages/nuget/"

# Latest declared source versions (per src/AprCommon/BprVersions/bpr_versions.h, 2026-05-30)
# These are the versions to publish once builders hand off artifacts.
source_versions:
  BprLicBase: "2.27.4"
  BprFace:    "2.24.115"
  BprCardQi:  "2.56.3"
  BprCardEmv: "2.57.1"
  BprICBA:    "2.58.1"
  BprFinger:  "2.24.203"
  BprIris:    "2.24.500"
  # BprQiEmv 2.50.11 — DEPRECATED, do not publish

# Published packages — append one entry per (package, version) after publishing.
# Example shape (none published yet):
#
# published:
#   - package: "BprCardQi"
#     version: "2.56.3"
#     project_id: <id>
#     source_repo: "bpr.cpp"
#     source_commit: "<git sha>"
#     built_by: "<builder agent>"
#     published_at: "YYYY-MM-DD"
#     files:
#       - "windows-64/libBprCardQi.dll"
#       - "windows-64/libBprCardQi.dll.sha256"
#       - "android-arm64/libBprCardQi.so"
#       - "manifest.json"
published:
  - package: "BprICBA"
    version: "2.58.1"
    package_id: 15
    project_id: 230
    source_repo: "bpr.cpp"
    source_commit: "f1cf1e3"
    built_by: "na-005-bnprs-fintech (BprICBA, bpr.cpp)"
    published_by: "bnprs-lib-forge (na-003/009)"
    published_at: "2026-05-30T11:16:29Z"
    files:
      - "windows-64/libBprICBA.dll"
      - "windows-64/libBprICBA.dll.sha256"
      - "manifest.json"

  - package: "BprCardQi"
    version: "2.56.3"
    package_id: 16
    project_id: 230
    source_repo: "bpr.cpp"
    source_commit: "f1cf1e3"
    built_by: "na-005-bnprs-fintech (BprCardQi, bpr.cpp)"
    published_by: "bnprs-lib-forge (na-003/009)"
    published_at: "2026-05-30"
    files:
      - "windows-32/libBprCardQi.dll"
      - "windows-64/libBprCardQi.dll"
      - "android-arm64/libBprCardQi.so"
      - "android-armv7/libBprCardQi.so"
      - "android-x86/libBprCardQi.so"
      - "android-x86_64/libBprCardQi.so"

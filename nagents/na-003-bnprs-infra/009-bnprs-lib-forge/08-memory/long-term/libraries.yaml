  # --- NuGet (multi-SDK wrapper pilot, built by na-003/010) ---
  - package: "Bnprs.NativeSdk.BprFace"
    package_type: "nuget"
    version: "2.24.114"            # wrapper version == native BprFace SemVer
    package_id: 17
    project_id: 230
    native_lib: "BprFace"
    source_repo: "bpr.cpp"
    source_commit: "16077f5"
    built_by: "na-004-bnprs-biometrics (BprFace native)"
    wrapped_by: "na-003/010 bnprs-lib-multi-sdk-wrapper"
    published_by: "bnprs-lib-forge (na-003/009)"

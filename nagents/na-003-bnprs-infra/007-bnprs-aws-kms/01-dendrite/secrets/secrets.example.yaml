# ============================================================
#  AGENT SECRETS — bnprs-aws-kms
# ============================================================
#  Copy this file to secrets.yaml and fill in real values.
#  secrets.yaml is git-ignored. NEVER commit real credentials.
#
#  KMS does NOT use API keys — access is via AWS IAM profiles.
#  No real secrets are needed here beyond the profile names.
# ============================================================

# ---- AWS CREDENTIALS ---- #
# Access via named profiles — no hardcoded keys ever
aws:
  bnprs_profile: "bnprs"       # account 891963159778, ap-south-2
  itp_profile: "itp"           # account 819144294008, us-east-2

# ---- ENVIRONMENT ---- #
env: "production"

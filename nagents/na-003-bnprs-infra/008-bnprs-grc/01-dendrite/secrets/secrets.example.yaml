# ============================================================
#  AGENT-SPECIFIC SECRETS — bnprs-grc
# ============================================================
#  Copy this file to secrets.yaml and fill in real values.
#  secrets.yaml is git-ignored. NEVER commit real credentials.
#
#  Shared secrets (LLM keys, Slack, storage) live in:
#    ../../../../../../secrets/secrets.yaml   (repo root)
#  Only put agent-specific credentials here.
# ============================================================

# ---- GRC SOURCE REPOSITORY ---- #
github:
  personal_access_token: "ghp_..."         # GitHub token for ramaiahsvn account
  repo: "ramaiahsvn/bpr.grc"

# ---- bpr.pci ALERT DELIVERY ---- #
smtp:
  host: "smtp.zoho.com"
  port: 587
  username: ""                             # Zoho Mail address for GRC alerts
  password: ""                             # App-specific password (NOT account password)
  from: ""                                 # Sender address
  to_ciso: ""                              # CISO email for CRITICAL/HIGH alerts
  to_it_manager: ""                        # IT Manager email for alert copies

webhook:
  slack_url: ""                            # Slack incoming webhook URL
  teams_url: ""                            # MS Teams incoming webhook URL (optional)

# ---- bpr.usb CHALLENGE-RESPONSE ---- #
# Key used to generate/verify HMAC-SHA256 admin override tokens
# Do NOT store the actual key here — reference only
usb_hmac_key_ref: "secrets-manager://qi-supervisor-key"   # Managed by 007-bnprs-aws-kms

# ---- AWS (READ-ONLY, GRC AUDIT ACCESS) ---- #
# Use AWS profiles — no hardcoded keys
aws:
  profile: "bnprs"                         # ~/.aws/credentials profile
  region: "ap-south-2"

# ---- AGENT-SPECIFIC OVERRIDES ---- #
slack:
  channel_id: ""                           # Slack channel for GRC compliance notifications

# ---- ENVIRONMENT ---- #
env: "production"                          # development | staging | production

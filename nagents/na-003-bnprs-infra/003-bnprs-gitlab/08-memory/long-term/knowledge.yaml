  - id: mem-009
    type: workaround
    content: >
      GitLab CE has no native MR approval rules (EE/Premium only). Workaround: emoji-based approval via CI/CD.
      Team members react with 👍 on the MR. CI job check_approvals (python:3-alpine) counts unique reactions.
      Requires 2 unique 👍 for bp_dev and bp_rel; master and ai_dev have no approval requirement.
      Pipeline fails if count < 2, blocking merge. Job runs only on merge_request_event pipelines.
    created_at: "2026-05-26"
    confidence: 0.99
    tags: [approvals, workaround, ce-limitation, pipeline, emoji]


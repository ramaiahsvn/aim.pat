  - id: mem-002
    type: backup
    content: >
      Weekly backup every Friday 18:30 UTC (midnight IST) via cron running
      /usr/local/bin/gitlab-backup-upload.sh. Creates Docker backup TAR, splits into 9MB chunks,
      uploads to Zoho WorkDrive B_GitLab workspace (rclone remote: zoho-workdrive).
      Retention: 1 local, 4 remote. Email alerts to ramaiah@bnprs.in on start/complete/fail.
      Log: /var/log/gitlab-backup.log.
    created_at: "2026-05-26"
    confidence: 0.99
    tags: [backup, zoho, rclone, cron, weekly]

  - id: mem-003
    type: workaround
    content: >
      Zoho WorkDrive routes files >10MB through upload.zoho.com which requires extra OAuth scopes
      not in standard WorkDrive API — causes INVALID_OAUTHSCOPE error. Workaround: split backup
      TAR into 9MB chunks with `split -b 9m`. Each chunk uploads fine via standard API.
      Restore: reassemble with `cat part.* > backup.tar`. Confirmed threshold: ≤9MB works, ≥11MB fails.
    created_at: "2026-05-26"
    confidence: 0.99
    tags: [zoho, workaround, backup, rclone, limitation]

  - id: mem-004
    type: critical
    content: >
      gitlab-secrets.json at /srv/gitlab/config/gitlab-secrets.json contains encryption keys.
      Loss of this file makes ALL encrypted data (CI/CD variables, tokens, 2FA secrets)
      irrecoverable. Always backup and restore it alongside the data backup from the SAME run —
      mismatched secrets from different backup runs = data loss.
    created_at: "2026-05-26"
    confidence: 1.0
    tags: [critical, backup, restore, secrets, encryption]


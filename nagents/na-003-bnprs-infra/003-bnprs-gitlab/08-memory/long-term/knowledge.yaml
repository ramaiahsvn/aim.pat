  - id: mem-023
    type: incident
    content: >
      2026-07-24 TLS CERT EXPIRY OUTAGE + fix. gitlab.bnprs.ai became unreachable (browsers/git/API refused:
      "certificate has expired"). Diagnosis: DNS ok (16.112.21.84), EC2 i-0b5a4cc29355c23bd running, ports
      80/443 open, container "Up healthy", https://16.112.21.84 -k -> 302 — ONLY the Let's Encrypt cert lapsed
      (notAfter Jul 23 23:17 UTC; caught ~6h later). ROOT CAUSE: LE auto-renew had been failing SILENTLY —
      `gitlab-ctl renew-le-certs` (run by cron `15 0 */4 * * `) needs /opt/gitlab/embedded/nodes/16.112.21.84.json
      (node attributes), which was MISSING -> every renew errored "Attributes not found ... has reconfigure been
      run yet?". That node file lives in the container's EPHEMERAL layer (NOT a mounted volume; only /etc/gitlab,
      /var/log/gitlab, /var/opt/gitlab are mounted) and is only (re)generated by `gitlab-ctl reconfigure`; it was
      absent (container was recreated ~mid-June, "Up 6 weeks"), so when the cert came due (~30d before Jul 23)
      nothing renewed. FIX: `sudo docker exec gitlab gitlab-ctl reconfigure` — regenerated the node JSON, served
      the ACME HTTP-01 challenge (/.well-known/acme-challenge, port 80 open), ISSUED a fresh cert (LE YR1, Jul 24
      -> Oct 22 2026), reloaded nginx, re-installed the letsencrypt-renew cron. Verified: openssl shows new dates,
      https://gitlab.bnprs.ai/users/sign_in -> HTTP 200. NOTE: renew-le-certs FAILS if the node file is missing —
      after ANY container recreate, run `gitlab-ctl reconfigure` (the image runs it on startup, but confirm the
      node file exists). PREVENTION options: external cert-expiry monitor / check before Oct 22; the account-lock
      403 gotcha from [[mem-021]] is unrelated (this was pure cert expiry, no auth involved).
    created_at: "2026-07-24"
    confidence: 1.0
    tags: [incident, tls, letsencrypt, cert-expiry, renew-le-certs, node-attributes, reconfigure, outage, cron, ephemeral-layer]


  - id: mem-002
    type: incident_learning
    content: >
      mGate UAT teardown (2026-06-08) hit MANY out-of-band / dependency blockers — terraform destroy
      stalled repeatedly. Recurring patterns & fixes for next time: (1) RDS/Aurora: live
      deletion_protection must be disabled via CLI AND config deletion_protection=false; module had
      skip_final_snapshot=false but no final_snapshot_identifier -> took a manual snapshot instead.
      (2) ALBs had deletion_protection enabled. (3) VPC delete blocked by ORPHANED resources not in
      terraform: 5 ECS services + tasks + an ALB + 6 security groups (servicesdb/mainqueueservice/
      otpstatus/callbackapplication/servicesotp -ecs-sg, callbackapplication-alb-sg) — deleted manually
      to release ENIs. (4) S3 versioned buckets need force_destroy or manual version+marker purge;
      portal-frontend bucket had ~4000 versions (page through ALL pages, don't use a 'no-progress'
      heuristic). (5) AppConfig: 82 hosted config versions block profile deletion. (6) IAM user
      mgate-appconfig-test had an out-of-band inline policy (ecs-elb-cw-readonly). (7) ECR repos must
      be emptied of images first. (8) Service stacks' data.tf had WRONG remote_state keys
      (platform/prod and flat bootstrap keys instead of */uat/) -> "Unable to find remote state".
      (9) Destroying gitlab-ci + ecr deleted ACCOUNT-GLOBAL OIDC providers (gitlab.bnprs.ai +
      token.actions.githubusercontent.com) that other stacks/CI share -> re-created both (AWS uses
      JWKS not thumbprint, so placeholder thumbprint is fine). LESSON: UAT bootstrap stacks should not
      own account-global/shared resources; and these envs are built on Windows (hardcoded Windows
      keystore paths break macOS gradle builds is the OTHER repo; here it was state-key drift).
    created_at: "2026-06-08"
    confidence: 1.0
    tags: [teardown, terraform, blockers, oidc, ecs-orphans, s3-versions, appconfig, ecr, lessons]


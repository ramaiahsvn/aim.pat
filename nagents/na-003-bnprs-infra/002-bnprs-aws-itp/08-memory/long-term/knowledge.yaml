  - id: mem-005
    type: incident_learning
    content: >
      2026-07-03 follow-up: July CE forecast rose to ~$16k (user thought our cleanup broke something).
      CROSS-CHECKED - it is REAL production traffic growth, NOT a billing glitch and NOT the cleanup.
      Root cause: incoming msgs to live gateway queue ITPSQS_01-prod-temp (us-east-2) surged ~2-2.5x
      from ~2M/day (Jun 17-27 baseline) to 5.68M on Jul-01 (peak), starting ~Jun-28. This correctly
      autoscaled maingateway-prod-temp ECS to 15 tasks (pipes-prod-temp=9; ~42 tasks total in cluster
      mgate-prod-temp-ecs-cluster) and drove ECS +32%, SQS +122% (per-request billing on 2-3x msgs),
      RDS +28%, CloudWatch +63%, CloudTrail +33% vs mid-June. HEALTHY not runaway: oldest-msg age only
      ~140-184s (queue draining in min), and DLQ ITPSQS_01-prod-temp-dlq had ZERO new dead-letters in
      16 days (its 5,112 msgs are a STALE old backlog - purge for hygiene, ~no cost). Daily run-rate
      thus climbed ~$420/day (mid-June) -> ~$500-550/day; $16k forecast holds ONLY if traffic sustains.
      NOTE: tax posts as a lump on the 1st (~$49 on Jul-01) inflating the day-1 figure CE extrapolates.
      LESSONS: (1) CE MONTHLY-granularity queries spanning a month boundary split into ResultsByTime[0]
      (partial) + [1]; reading only [0] silently compares mismatched day-counts - use single-month
      windows or DAILY+sum. (2) SQS msg-age is a CloudWatch metric (ApproximateAgeOfOldestMessage), NOT
      a get-queue-attributes attribute. (3) ecs describe-services caps at 10 services/call.
    created_at: "2026-07-03"
    confidence: 1.0
    tags: [cost-spike, sqs, ecs-autoscaling, mgate-prod-temp, traffic-surge, dlq, ce-forecast, gotchas]


  - id: mem-003
    type: technical_knowledge
    content: >-
      MODEL CO-EXTRACTION (BprFace, critical for any lib whose native loads a sibling data file): the
      native resolves its model (bpr.model.onnx — a 75 MB encrypted TLV blob) via ITS OWN library
      directory (dladdr). JNA/P-Invoke/purego extract only the native to a temp dir, so the model would
      be missing. Every wrapper loader MUST extract the native AND the model to the SAME temp dir before
      load. Impl: Maven BprFaceNative.get() (Native.load(absPath)); NuGet static-ctor + NativeLibrary.
      SetDllImportResolver — hence net8.0 NOT netstandard2.0 (resolver is .NET 6+); Go go:embed + Dlopen.
    created_at: "2026-07-21"
    last_accessed: "2026-07-21"
    access_count: 1
    confidence: 0.97
    source: "session-2026-07-21"
    tags: [model-co-extraction, loader, jna, pinvoke, purego, net8-not-netstandard, dladdr]

  - id: mem-004
    type: technical_knowledge
    content: >-
      GO MAJOR-VERSION /vN SUFFIX (corrects the nucleus naming scheme). The nucleus lists the Go path as
      …/go/<lib-lower>, but all these libs are 2.x and Go REQUIRES the module path to end in /v2 for any
      version ≥ v2.0.0 — else `go get` fails "module path must match major version …/v2". Real path:
      go.mod `module …/go/<lib>/v2`; consumers import …/go/<lib>/v2 (package name unchanged); git tag stays
      go/<lib>/vX.Y.Z. Apply /v2 to EVERY Go wrapper here (BprCardQi, BprFace, …). Also (pilot): purego.Dlopen
      /RTLD_* are unix-only (Windows needs a windows.LoadLibrary split loader); RegisterLibFunc is cross-platform.
    created_at: "2026-07-21"
    last_accessed: "2026-07-21"
    access_count: 1
    confidence: 0.98
    source: "session-2026-07-21"
    tags: [go-modules, v2-suffix, naming-scheme-correction, purego, split-loader]

  - id: mem-005
    type: technical_knowledge
    content: >-
      SELF-CONTAINED NATIVES CHANGED THE LEAF (2026-07-21). cpp-face (na-004/001) now ships a self-contained
      libBprFace.{so,dylib} with OpenCV 4.10.0 STATICALLY bundled — so there is NO separate libBprFaceDeps /
      opencv / ffmpeg to embed anymore. Per-platform wrapper leaf = ONE native + bpr.model.onnx (was: lib +
      deps + opencv + ffmpeg + model). BprFace inference is OpenCV-DNN, NOT a separate ONNX Runtime. Verify a
      native is self-contained before wrapping: macOS otool -L (only system frameworks/@rpath), Linux ldd (no
      opencv, no "not found"). Windows still uses the split BprFaceDeps.dll (MINGW whole-archive).

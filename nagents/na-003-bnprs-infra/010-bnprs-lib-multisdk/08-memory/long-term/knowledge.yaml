      model → GENERIC: PUT …/packages/generic/<pkg>/<ver>/<path>, header PRIVATE-TOKEN:$GITLAB_PAT (201).
      NUGET → HTTP BASIC ONLY: curl --user root:$GITLAB_PAT --form package=@x.nupkg …/packages/nuget/ (201);
      a PRIVATE-TOKEN header 401s. MAVEN → PUT jar + pom to …/packages/maven/<group-path>/<artifact>/<ver>/<file>,
      header Private-Token:$GITLAB_PAT (200). GO → NO upload endpoint: commit the module into project 230's
      git repo under go/<lib>/ + push a SemVer tag go/<lib>/vX.Y.Z; the GitLab Go proxy serves it (go get via
      GOPROXY=direct + git insteadOf auth works). Consumers use read-only deploy token bnprs-libs-readonly.

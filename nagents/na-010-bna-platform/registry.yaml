# ============================================================
#  AGENT REGISTRY — na-010-bna-platform
# ============================================================
#  ISO 8583 DE-style codes. One byte = DE01 to DEFF (255 max).
#  IMMUTABLE: once a code is assigned it is NEVER reused,
#  even if the agent is retired or deleted.
# ============================================================

group:
  id: "na-010"
  name: "bna-platform"
  description: "BNA — BNPRS Neura Agents Platform. Cross-group orchestration and auto-pilot coordination of the organisation."
  max_agents: 255
  # Default operating mode for agents in this group.
  # propose-then-approve: plan + coordinate autonomously, but route
  # consequential actions through human/CEO approval gates.
  autonomy: "propose-then-approve"
  # Groups this platform orchestrates.
  coordinates:
    - "na-006-bnprs-deployments"
    - "na-007-bnprs-cxo"
    - "na-008-bnprs-team"
    - "na-009-bnprs-products"

registry:
  - code: "001"
    name: "bna-orchestrator"
    label: "BNA Orchestrator"
    role: "Master Orchestration & Auto-Pilot Conductor"
    path: "001-bna-orchestrator"
    status: active
    created_at: "2026-05-30"

  - code: "002"
    name: "bna-cxo-liaison"
    label: "BNA CXO Liaison"
    role: "CXO Group Liaison (na-007)"
    path: "002-bna-cxo-liaison"
    coordinates: "na-007-bnprs-cxo"
    status: active
    created_at: "2026-05-30"

  - code: "003"
    name: "bna-deployments-liaison"
    label: "BNA Deployments Liaison"
    role: "Deployments Group Liaison (na-006)"
    path: "003-bna-deployments-liaison"
    coordinates: "na-006-bnprs-deployments"
    status: active
    created_at: "2026-05-30"

  - code: "004"
    name: "bna-team-liaison"
    label: "BNA Team Liaison"
    role: "Team Group Liaison (na-008)"
    path: "004-bna-team-liaison"
    coordinates: "na-008-bnprs-team"
    status: active
    created_at: "2026-05-30"

  - code: "005"
    name: "bna-products-liaison"
    label: "BNA Products Liaison"
    role: "Products Group Liaison (na-009)"
    path: "005-bna-products-liaison"
    coordinates: "na-009-bnprs-products"
    status: active
    created_at: "2026-05-30"
